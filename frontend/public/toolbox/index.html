<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>개발용 HTML 도구 런처</title>
<!-- 변경이력·개선메모: 개선사항_메모.md 참고 -->
<style>
:root {
	--bg: #1e1e1e; --card: #252526; --border: #3c3c3c; --text: #d4d4d4;
	--muted: #858585; --accent: #0078d4;
}
@media (prefers-color-scheme: light) {
	:root {
		--bg: #f7f9fc; --card: #fff; --border: #dde4ee; --text: #26303e;
		--muted: #6b7686; --accent: #3f6fb5;
	}
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
	font-family: 'Consolas', 'D2Coding', '맑은 고딕', monospace;
	background: var(--bg); color: var(--text);
	min-height: 100vh; display: flex; flex-direction: column;
	align-items: center; justify-content: center; padding: 40px 20px;
}
h1 { font-size: 18px; letter-spacing: 3px; margin-bottom: 6px; }
.sub { color: var(--muted); font-size: 12px; margin-bottom: 32px; }
.cards {
	display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
	gap: 16px; width: 100%; max-width: 1020px;
}
a.card {
	display: block; background: var(--card); border: 1px solid var(--border);
	border-radius: 10px; padding: 22px 20px; text-decoration: none;
	color: var(--text); transition: border-color .15s, transform .1s;
}
a.card:hover { border-color: var(--accent); transform: translateY(-2px); }
.icon { font-size: 30px; margin-bottom: 12px; }
.name { font-size: 14px; font-weight: bold; margin-bottom: 6px; }
.desc { font-size: 11px; color: var(--muted); line-height: 1.7; }
.foot { margin-top: 36px; font-size: 11px; color: var(--muted); }
</style>
</head>
<body>
<h1>개발용 HTML 도구</h1>
<p class="sub">전부 단일 파일 · 외부 CDN 없음 · 오프라인 동작</p>
<div class="cards" id="cards"></div>
<p class="foot">새 탭으로 열림 · 이 폴더째 복사하면 어디서든 동작</p>
<script>
var TOOLS = [
	{ file: "dev_tools.html", icon: "🛠", name: "개발자 도구 모음",
	  desc: "카멜 변환 / JSON / 날짜 / INSERT 생성 / 정규식 / Base64·data URI / SQL 페이징 / URL / JWT" },
	{ file: "sql_snippets.html", icon: "🗄", name: "SQL 스니펫",
	  desc: "운영 조회 단골 쿼리 모음 — Tibero·Oracle / MySQL·MariaDB / PostgreSQL / SQL Server / Sybase 방언 전환, 검색, 즐겨찾기" },
	{ file: "특수문자_모음.html", icon: "①", name: "특수문자 모음",
	  desc: "공문서·SR용 특수문자 클릭 복사 + 한글 IME 입력법 + 즐겨찾기 + 조합 모드" },
	{ file: "jsp_formatter.html", icon: "🧹", name: "JSP/HTML 줄정리",
	  desc: "들여쓰기 재배치 — 스크립틀릿 { } 인지, 보존 블록 원형 유지" },
	{ file: "산출물_sql.html", icon: "📋", name: "산출물 SQL 가이드",
	  desc: "공공 데이터 산출물 9종 문서별 추출 SQL + 기입 규칙 — 방언 5종(Tibero·MySQL·PG·MSSQL·Sybase) 전환, 스키마 일괄 치환, 편집 모드" }
];
var wrap = document.getElementById("cards");
TOOLS.forEach(function (t) {
	var a = document.createElement("a");
	a.className = "card";
	a.href = t.file;
	a.target = "_blank";
	a.rel = "noopener";
	a.innerHTML = '<div class="icon">' + t.icon + '</div><div class="name">' + t.name + '</div><div class="desc">' + t.desc + '</div>';
	wrap.appendChild(a);
});
</script>
</body>
</html>
