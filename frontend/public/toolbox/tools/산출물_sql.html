var schemaInput = document.getElementById('schemas');
// 기본값을 실제 값으로 채우지 않는다 — 채우면 IN ('SCHEMA_A','SCHEMA_B')로 치환된 쿼리가
// 에러 없이 0행만 반환해 원인을 못 찾는다. 빈 값이면 쿼리 상단에 경고를 붙인다.
schemaInput.value = localStorage.getItem('deliv_schemas') || '';
function schemaNames() {
  return schemaInput.value.split(',').map(function(s){
    // 사용자가 "SCHEMA" 처럼 큰따옴표를 붙여도 식별자 인용은 이름의 일부가 아니므로 제거.
    // 홑따옴표는 문자열 리터럴 종료를 막기 위해 이스케이프.
    return s.trim().replace(/^["`[]|["`\]]$/g, '').trim().replace(/'/g, "''");
  }).filter(Boolean);
}
function schemaMissing() { return schemaNames().length === 0; }
function schemaList() {
  var arr = schemaNames();
  if (!arr.length) arr = ['__스키마_미입력__'];   // 0행 대신 눈에 띄게
  return "('" + arr.join("', '") + "')";
}
function onSchemaChange() {
  localStorage.setItem('deliv_schemas', schemaInput.value);
  render();
}

// ── 임시/백업 테이블 제외 필터 ───────────────────────────────
// 전역 1개 — 02·03에 동시 주입 (한쪽만 걸면 테이블/컬럼 건수 불일치 → 검수 걸림).
// 기본 OFF. 켜도 TEST는 기본 꺼짐(%TEST%가 LATEST 등 정상 이름을 잡을 수 있어서).
// 켠 채 뽑은 산출물은 "제외 목록 확인쿼리"로 오탐 검증 후 제출할 것.
var exclCfg = JSON.parse(localStorage.getItem('deliv_excl') || '{"on":false,"bak":true,"date":true,"test":false,"pfx":""}');
function saveExcl() {
  localStorage.setItem('deliv_excl', JSON.stringify(exclCfg));
  syncExclUI();
  render();
}
function syncExclUI() {
  document.getElementById('excl_on').checked = exclCfg.on;
  document.getElementById('excl_detail').style.display = exclCfg.on ? '' : 'none';
  document.getElementById('excl_bak').checked = exclCfg.bak;
  document.getElementById('excl_date').checked = exclCfg.date;
  document.getElementById('excl_test').checked = exclCfg.test;
  document.getElementById('excl_pfx').value = exclCfg.pfx;
}
function exclPrefixes() {
  return exclCfg.pfx.split(',').map(function(s){ return s.trim().replace(/'/g, "''").toUpperCase(); }).filter(Boolean);
}
// 방언별 "걸리는 조건"(긍정형) 목록 — 본쿼리는 NOT( OR... )로 감싸 제외, 확인쿼리는 OR 그대로
function exclConds(col) {
  var d = currentDialect, c = [];
  var U = 'UPPER(' + col + ')';
  function likeEsc(pat) {   // 리터럴 _ 포함 LIKE — 방언별 이스케이프 (_는 와일드카드라 그대로 쓰면 오탐)
    if (d === 'mssql' || d === 'sybase') return U + " LIKE '" + pat.replace(/_/g, '[_]') + "'";
    if (d === 'tibero') return U + " LIKE '" + pat.replace(/_/g, '\\_') + "' ESCAPE '\\'";
    return U + " LIKE '" + pat.replace(/_/g, '!_') + "' ESCAPE '!'";   // mysql·pg (백슬래시 중첩 회피)
  }
  if (exclCfg.bak) { c.push(likeEsc('%_BAK')); c.push(likeEsc('%_BAK_%')); }
  if (exclCfg.date) {
    if (d === 'tibero') {        // Tibero 정규식 엔진 제한적 — 이 두 패턴은 동작 확인됨(2026-07-14). JDBC-11042 나면 LIKE로 분해
      c.push("REGEXP_LIKE(" + col + ", '_[0-9]{6,}')");
      c.push("REGEXP_LIKE(" + col + ", '_(19|20)[0-9]{2}(_|$)')");
    } else if (d === 'mysql') {
      c.push(col + " REGEXP '_[0-9]{6,}'");
      c.push(col + " REGEXP '_(19|20)[0-9]{2}(_|$)'");
    } else if (d === 'pg') {
      c.push(col + " ~ '_[0-9]{6,}'");
      c.push(col + " ~ '_(19|20)[0-9]{2}(_|$)'");
    } else {                     // mssql·sybase: 정규식 없음 — LIKE [0-9] 문자클래스 근사 (숫자 6연속 / _연도)
      c.push(col + " LIKE '%[_][0-9][0-9][0-9][0-9][0-9][0-9]%'");
      c.push(col + " LIKE '%[_]19[0-9][0-9]'");
      c.push(col + " LIKE '%[_]20[0-9][0-9]'");
      c.push(col + " LIKE '%[_]19[0-9][0-9][_]%'");
      c.push(col + " LIKE '%[_]20[0-9][0-9][_]%'");
    }
  }
  if (exclCfg.test) c.push(U + " LIKE '%TEST%'");
  exclPrefixes().forEach(function(p){ c.push(likeEsc(p + '%')); });
  return c;
}
function exclBlock(col, inline) {
  if (!exclCfg.on) return '';
  var conds = exclConds(col);
  if (!conds.length) return '';
  if (inline) return ' AND NOT (' + conds.join(' OR ') + ')';
  return '\n  AND NOT (   ' + conds.join('\n           OR ') + ' )';
}
// 제외될 테이블 목록 확인쿼리 — 필터 켜고 산출물 뽑기 전 반드시 한 번 실행해 오탐 검증
var EXCL_CHECK = {
  tibero: { sel:'OWNER, TABLE_NAME', from:'ALL_TABLES',
            where:'OWNER IN __SCHEMAS__', col:'TABLE_NAME' },
  mysql:  { sel:'TABLE_SCHEMA, TABLE_NAME', from:'information_schema.TABLES',
            where:"TABLE_SCHEMA IN __SCHEMAS__ AND TABLE_TYPE = 'BASE TABLE'", col:'TABLE_NAME' },
  pg:     { sel:'schemaname, tablename', from:'pg_tables',
            where:'schemaname IN __SCHEMAS__', col:'tablename' },
  mssql:  { sel:'s.name, t.name', from:'sys.tables t JOIN sys.schemas s ON t.schema_id = s.schema_id',
            where:'s.name IN __SCHEMAS__', col:'t.name' },
  sybase: { sel:'o.name', from:'sysobjects o', where:"o.type = 'U'", col:'o.name' }
};
function copyExclCheck() {
  var m = EXCL_CHECK[currentDialect];
  var conds = exclConds(m.col);
  var q;
  if (!exclCfg.on || !conds.length) {
    q = '-- 제외 조건 없음 — 상단 필터 체크박스를 켜고 세부 항목을 선택하세요';
  } else {
    q = '-- 제외될(임시/백업 의심) 테이블 목록 — 정상 테이블이 섞였는지 눈으로 검증 후 산출물 추출\n'
      + 'SELECT ' + m.sel + '\nFROM   ' + m.from
      + '\nWHERE  ' + m.where.replace(/__SCHEMAS__/g, schemaList())
      + '\n  AND (   ' + conds.join('\n       OR ') + ' )'
      + '\nORDER  BY ' + m.sel + ';';
  }
  var ta = document.createElement('textarea');
  ta.value = q;
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); toast('제외 목록 확인쿼리 복사됨'); }
  catch(e) { toast('복사 실패 — 수동 선택 필요'); }
  document.body.removeChild(ta);
}
// Sybase ASE는 USE DB명으로 전환 — 스키마 IN절을 쓰지 않으므로 입력칸을 비활성화
function syncSchemaInputState() {
  var off = (currentDialect === 'sybase');
  schemaInput.disabled = off;
  schemaInput.style.opacity = off ? '0.45' : '';
  schemaInput.placeholder = off ? 'Sybase ASE: 미사용 (USE DB명으로 전환)' : 'SCHEMA_A,SCHEMA_B';
}
function switchDialect(k) {
  currentDialect = k;
  editMode = {};
  editBuffer = {};
  localStorage.setItem('deliv_dialect', k);
  syncSchemaInputState();
  renderTabs();
  render();
}

// ── 렌더링 ───────────────────────────────────────────────────
var tabsWrap = document.getElementById('db_tabs');
DIALECTS.forEach(function(d) {
  var t = document.createElement('div');
  t.className = 'db-tab ' + d.cls;
  t.id = 'tab_' + d.key;
  t.textContent = d.label;
  t.title = d.hint;
  t.onclick = function(){ switchDialect(d.key); };
  tabsWrap.appendChild(t);
});
function renderTabs() {
  DIALECTS.forEach(function(d) {
    var el = document.getElementById('tab_' + d.key);
    el.className = 'db-tab ' + d.cls + (d.key === currentDialect ? ' active' : '');
  });
}

DOCS.sort(function(a, b) { return a.no.localeCompare(b.no); });   // 번호순 정렬 (배열 물리 순서 무관)

var sidebar = document.getElementById('sidebar');
// 번호순(발주처 규정순) 고정 유지 — 재정렬 안 함. 체크는 제자리서 강조만. 상태는 localStorage(deliv_use)
// 하향식 그룹: 준비·구조(00~04) / 표준화(05~08) / 연계(09) / 추가 산출물(10~15, 시스템 필요분)
function groupOf(no) {
  if (no >= '90') return '부록';
  if (no <= '04') return '준비 · 구조';
  if (no <= '08') return '표준화';
  if (no === '09') return '연계';
  return '추가 산출물';
}
function renderSidebar() {
  sidebar.innerHTML = '';
  var lastGroup = null;
  DOCS.forEach(function(d) {
    var g = groupOf(d.no);
    if (g !== lastGroup) {   // 그룹 바뀌면 소제목 삽입
      var h = document.createElement('div'); h.className = 'sidebar-group'; h.textContent = g; sidebar.appendChild(h); lastGroup = g;
    }
    var b = document.createElement('div');   // button 안에 checkbox = 무효 HTML → div로 (onclick·stopPropagation 유지)
    b.className = 'doc-btn' + (docUse[d.key] ? ' used' : ' unused') + (d.key === currentKey ? ' active' : '');
    b.id = 'btn_' + d.key;
    b.innerHTML = '<input type="checkbox" class="doc-chk"' + (docUse[d.key] ? ' checked' : '')
                + ' onclick="toggleUse(event,\'' + d.key + '\')" title="산출물 낼 것으로 표시">'
                + '<span class="doc-txt"><span class="no">' + d.no + '</span>' + d.label + '</span>';
    b.onclick = function() { currentKey = d.key; editMode = {}; editBuffer = {}; localStorage.setItem('deliv_lastdoc', d.key); render(); };
    sidebar.appendChild(b);
  });
}
function toggleUse(e, key) {
  e.stopPropagation();   // 체크박스 클릭이 문서 전환으로 번지지 않게
  docUse[key] = !docUse[key];
  localStorage.setItem('deliv_use', JSON.stringify(docUse));
  renderSidebar();
}
renderSidebar();

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function buildQuery(raw) {
  var q = raw.replace(/__SCHEMAS__/g, schemaList());
  // __EXCL(컬럼)__ / __EXCLI(컬럼)__ → 제외 필터 블록 (OFF면 흔적 없이 제거)
  var hadExcl = false;
  q = q.replace(/__EXCLI\(([^)]+)\)__/g, function(_, col){ var b = exclBlock(col, true);  if (b) hadExcl = true; return b; });
  q = q.replace(/__EXCL\(([^)]+)\)__/g,  function(_, col){ var b = exclBlock(col, false); if (b) hadExcl = true; return b; });
  if (hadExcl) {
    var warn = '-- ⚠ 임시/백업 테이블 제외 필터 적용됨 (상단 체크박스) — 02·03 동일 적용해야 건수 정합\n'
             + '--    산출물 추출 전 "제외 목록 확인쿼리"로 오탐(정상 테이블 걸림) 검증할 것\n';
    if (currentDialect === 'mssql' || currentDialect === 'sybase') {
      warn += '--    이 방언은 정규식 미지원 — LIKE 근사라 일부 패턴(_2024A 등) 누락 가능\n';
    }
    if (exclCfg.test) {
      warn += "--    TEST 포함 제외 켜짐 — LATEST 등 정상 이름도 걸릴 수 있음 (확인쿼리 필수)\n";
    }
    q = warn + q;
  }
  // 스키마를 안 넣으면 쿼리가 조용히 0행을 반환한다 — 실행 전에 눈으로 알아채게
  if (raw.indexOf('__SCHEMAS__') >= 0 && schemaMissing() && currentDialect !== 'sybase') {
    q = '-- ⚠ 상단 "업무 스키마" 입력칸이 비어 있음 — 그대로 실행하면 0행만 나옵니다\n'
      + '--    00번 문서의 스키마 분포 쿼리로 먼저 확인하세요\n' + q;
  }
  return q;
}
function dialectObj() { return DIALECTS.filter(function(x){return x.key === currentDialect;})[0]; }

function render() {
  renderSidebar();
  var d = DOCS.filter(function(x){return x.key === currentKey;})[0];
  if (!d) {  // 낡은 저장 키 방어 — 없는 문서면 첫 문서로 복구
    currentKey = DOCS[0].key;
    localStorage.setItem('deliv_lastdoc', currentKey);
    d = DOCS[0];
  }
  var dl = dialectObj();
  var h = '<h2>' + d.no + ' ' + d.label + '</h2>'
        + '<div class="doc-sub">' + d.sub + '<br>[' + dl.label + '] ' + dl.hint + '</div>';

  if (d.formCols) {
    h += '<div class="sec"><div class="sec-title">권장 열 구성 (참고 — 환경별 가감)</div>'
       + '<div class="form-cols">' + d.formCols + '</div>'
       + '<div class="form-note">열이 다르면 아래 쿼리를 편집 모드로 열어 SELECT 목록만 가감하면 됨.</div></div>';
  }

  h += '<div class="sec"><div class="sec-title">SQL — ' + dl.label + '</div>';
  d.sql.forEach(function(s, i) {
    var id = d.key + '_' + i;
    var raw = s.q[currentDialect];
    var missing = !raw;
    var q = missing ? '-- 이 방언 버전 미작성 — 편집 모드에서 직접 작성하거나 다른 방언 참고' : buildQuery(raw);
    h += '<div class="sql-block"><div class="sql-head">'
       + '<span class="sql-title">' + s.title + '</span>'
       + '<button class="btn-copy" onclick="copyQ(\'' + id + '\')">복사</button>'
       + '<button class="btn-edit' + (editMode[id] ? ' on' : '') + '" onclick="toggleEdit(\'' + id + '\')">' + (editMode[id] ? '편집 중' : '편집') + '</button>'
       + '</div>';
    if (editMode[id]) {
      var val = (editBuffer[id] !== undefined) ? editBuffer[id] : q;   // 재렌더에도 편집 내용 유지
      h += '<textarea class="q" id="q_' + id + '" rows="' + (val.split('\n').length + 1) + '" oninput="bufQ(\'' + id + '\', this.value)">' + esc(val) + '</textarea>';
    } else {
      h += '<pre class="q' + (missing ? ' missing' : '') + '" id="q_' + id + '">' + esc(q) + '</pre>';
    }
    h += '</div>';
  });
  h += '</div>';

  if (d.manual) {
    h += '<div class="sec"><div class="sec-title">수기 잔여 / 기입 규칙</div><ul class="plain">';
    d.manual.forEach(function(m){ h += '<li>' + m + '</li>'; });
    h += '</ul></div>';
  }
  if (d.notes) {
    h += '<div class="sec"><div class="sec-title">주의 / 팁</div><ul class="plain">';
    d.notes.forEach(function(m){ h += '<li>' + m + '</li>'; });
    h += '</ul></div>';
  }
  document.getElementById('content').innerHTML = h;
}

function bufQ(id, v) { editBuffer[id] = v; }

function toggleEdit(id) {
  if (editMode[id]) { delete editMode[id]; delete editBuffer[id]; } else { editMode[id] = true; }
  var scroll = document.getElementById('content').scrollTop;
  render();
  document.getElementById('content').scrollTop = scroll;
}

function copyQ(id) {
  var el = document.getElementById('q_' + id);
  var text = (el.tagName === 'TEXTAREA') ? el.value : el.textContent;
  var ta = document.createElement('textarea');
  ta.value = text;
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); toast('복사됨'); }
  catch(e) { toast('복사 실패 — 수동 선택 필요'); }
  document.body.removeChild(ta);
}

var toastTimer;
function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ t.style.opacity = '0'; }, 1500);
}

syncSchemaInputState();
syncExclUI();
renderTabs();
render();
</script>
</body>
</html>
