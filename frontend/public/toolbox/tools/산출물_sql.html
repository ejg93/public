<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>산출물 SQL 가이드</title>
<!-- 변경이력·개선메모: 개선사항_메모.md 참고 -->
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root { --bg:#1e1e1e; --surface:#252526; --border:#3c3c3c; --text:#d4d4d4; --muted:#858585; --accent:#0078d4; --green:#16825d; --orange:#f0a500; --red:#d16969; --mysql:#00bcd4; --pg:#5b9bd5; --ms:#c586c0; --sy:#ce9178; }
body { font-family:'Consolas','D2Coding','맑은 고딕',monospace; background:var(--bg); color:var(--text); height:100vh; display:flex; flex-direction:column; overflow:hidden; }
header { background:var(--surface); border-bottom:1px solid var(--border); padding:10px 16px; display:flex; align-items:center; gap:12px; flex-shrink:0; flex-wrap:wrap; }
header h1 { font-size:13px; color:#ccc; letter-spacing:2px; }
.db-tabs { display:flex; gap:6px; flex-wrap:wrap; }
.db-tab { padding:4px 12px; border-radius:4px; cursor:pointer; font-size:11.5px; font-weight:bold; letter-spacing:0.5px; border:2px solid transparent; user-select:none; }
.db-tab.tibero { background:rgba(240,165,0,0.15); color:var(--orange); }
.db-tab.tibero.active { border-color:var(--orange); }
.db-tab.mysql { background:rgba(0,188,212,0.1); color:var(--mysql); }
.db-tab.mysql.active { border-color:var(--mysql); }
.db-tab.pg { background:rgba(91,155,213,0.12); color:var(--pg); }
.db-tab.pg.active { border-color:var(--pg); }
.db-tab.mssql { background:rgba(197,134,192,0.12); color:var(--ms); }
.db-tab.mssql.active { border-color:var(--ms); }
.db-tab.sybase { background:rgba(206,145,120,0.12); color:var(--sy); }
.db-tab.sybase.active { border-color:var(--sy); }
.schema-wrap { display:flex; align-items:center; gap:6px; margin-left:auto; }
.schema-wrap label { font-size:11px; color:var(--muted); }
.schema-wrap input { background:#3c3c3c; border:1px solid #555; border-radius:3px; color:var(--text); font-family:'Consolas',monospace; font-size:12px; padding:5px 10px; outline:none; width:240px; }
.schema-wrap input:focus { border-color:var(--accent); }
.excl-wrap { width:100%; display:flex; align-items:center; gap:10px; flex-wrap:wrap; font-size:11px; color:var(--muted); padding-top:2px; }
.excl-wrap label { display:flex; align-items:center; gap:4px; cursor:pointer; user-select:none; }
.excl-wrap input[type=checkbox] { width:12px; height:12px; accent-color:var(--orange); cursor:pointer; }
.excl-master { color:#c8c8c8; font-weight:bold; }
.excl-detail { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
.excl-detail input[type=text] { background:#3c3c3c; border:1px solid #555; border-radius:3px; color:var(--text); font-family:'Consolas',monospace; font-size:11px; padding:3px 8px; outline:none; width:210px; }
.excl-detail input[type=text]:focus { border-color:var(--orange); }
.btn-excl-check { font-family:'Consolas',monospace; font-size:10.5px; border:1px solid var(--orange); border-radius:4px; cursor:pointer; padding:3px 10px; background:transparent; color:var(--orange); }
.btn-excl-check:hover { background:rgba(240,165,0,0.15); }
.main { flex:1; display:flex; overflow:hidden; }
.sidebar { width:230px; background:var(--surface); border-right:1px solid var(--border); padding:8px 6px; display:flex; flex-direction:column; gap:2px; overflow-y:auto; flex-shrink:0; }
.doc-btn { padding:8px 10px; border-radius:4px; cursor:pointer; font-size:12px; color:#ccc; border:none; border-left:3px solid transparent; background:transparent; text-align:left; width:100%; font-family:'Consolas',monospace; line-height:1.4; display:flex; align-items:flex-start; }
.doc-btn:hover { background:#2a2d2e; }
.doc-btn.active { background:#094771; color:#fff; }
.doc-btn .no { color:var(--orange); margin-right:6px; }
.doc-chk { margin-right:7px; margin-top:2px; width:13px; height:13px; accent-color:var(--green); cursor:pointer; flex-shrink:0; }
.doc-txt { flex:1; min-width:0; word-break:keep-all; line-height:1.4; }
.doc-btn.used { color:#fff; border-left-color:var(--green); background:rgba(22,130,93,0.12); }
.doc-btn.used .no { color:var(--green); }
.doc-btn.unused { opacity:0.62; }
.doc-btn.unused:hover { opacity:0.85; }
.doc-btn.active { background:#094771; color:#fff; border-left-color:var(--accent); opacity:1; }
.sidebar-group { font-size:9.5px; color:var(--muted); letter-spacing:1.5px; margin:11px 6px 3px; padding-bottom:3px; border-bottom:1px solid var(--border); }
.sidebar-group:first-child { margin-top:2px; }
.content { flex:1; overflow-y:auto; padding:18px 22px; }
h2 { font-size:15px; color:#fff; margin-bottom:4px; }
.doc-sub { font-size:11px; color:var(--muted); margin-bottom:14px; line-height:1.6; }
.sec { margin-bottom:18px; }
.sec-title { font-size:12px; color:var(--orange); letter-spacing:1px; margin-bottom:6px; }
.form-cols { background:var(--surface); border:1px solid var(--border); border-radius:6px; padding:10px 14px; font-size:11px; line-height:1.9; color:#c8c8c8; }
.form-cols .req { color:var(--red); font-weight:bold; }
.form-note { font-size:10px; color:var(--muted); margin-top:4px; }
ul.plain { list-style:none; }
ul.plain li { font-size:11.5px; line-height:1.8; color:#c8c8c8; padding-left:14px; position:relative; }
ul.plain li::before { content:'·'; position:absolute; left:2px; color:var(--orange); }
.sql-block { margin-bottom:14px; }
.sql-head { display:flex; align-items:center; gap:8px; margin-bottom:5px; }
.sql-title { font-size:12px; color:#9cdcfe; font-weight:bold; }
.sql-head button { font-family:'Consolas',monospace; font-size:11px; border:none; border-radius:4px; cursor:pointer; padding:4px 12px; }
.btn-copy { background:var(--green); color:#fff; }
.btn-edit { background:#3c3c3c; color:var(--text); }
.btn-edit.on { background:var(--orange); color:#000; }
pre.q { background:#111; border:1px solid var(--border); border-radius:4px; color:#9cdcfe; font-size:12.5px; padding:12px 14px; line-height:1.7; overflow-x:auto; white-space:pre; }
pre.q.missing { color:var(--muted); font-style:italic; }
textarea.q { width:100%; background:#111; border:1px solid var(--orange); border-radius:4px; color:#9cdcfe; font-family:'Consolas','D2Coding',monospace; font-size:12.5px; padding:12px 14px; line-height:1.7; resize:vertical; outline:none; min-height:180px; }
#toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--green); color:#fff; padding:8px 20px; border-radius:20px; font-size:12px; opacity:0; transition:opacity 0.3s; pointer-events:none; z-index:999; }
/* 커스텀 스크롤바 — 얇고 둥근 다크 */
.sidebar, .content, pre.q, textarea.q { scrollbar-width:thin; scrollbar-color:#454545 transparent; }
::-webkit-scrollbar { width:10px; height:10px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:#3a3a3a; border-radius:6px; border:2px solid transparent; background-clip:content-box; }
::-webkit-scrollbar-thumb:hover { background:#565656; border:2px solid transparent; background-clip:content-box; }
::-webkit-scrollbar-corner { background:transparent; }
</style>
</head>
<body>
<header>
  <h1>산출물 SQL 가이드</h1>
  <div class="db-tabs" id="db_tabs"></div>
  <div class="schema-wrap">
    <label for="schemas">업무 스키마(쉼표 구분)</label>
    <input type="text" id="schemas" placeholder="SCHEMA_A,SCHEMA_B" oninput="onSchemaChange()">
  </div>
  <div class="excl-wrap">
    <label class="excl-master" title="테이블 목록 문서(02·03)에 공통 적용 — 한쪽만 걸면 건수 안 맞음">
      <input type="checkbox" id="excl_on" onchange="exclCfg.on=this.checked; saveExcl()"> 임시/백업 테이블 제외 필터 (02·03 공유)</label>
    <span id="excl_detail" class="excl-detail">
      <label title="_BAK로 끝나거나 _BAK_ 포함"><input type="checkbox" id="excl_bak" onchange="exclCfg.bak=this.checked; saveExcl()"> _BAK</label>
      <label title="이름에 _+숫자6자리 이상(_20240102 등) 또는 _연도4자리"><input type="checkbox" id="excl_date" onchange="exclCfg.date=this.checked; saveExcl()"> 날짜 스냅샷</label>
      <label title="이름에 TEST 포함 — LATEST 등 정상 이름도 걸릴 수 있음, 확인쿼리로 검증 필수"><input type="checkbox" id="excl_test" onchange="exclCfg.test=this.checked; saveExcl()"> TEST 포함</label>
      <input type="text" id="excl_pfx" placeholder="개인 접두사: TLYH_,YDI_ (쉼표)" title="개발자 이니셜 등 — 이 접두사로 시작하는 테이블 제외" onchange="exclCfg.pfx=this.value; saveExcl()">
      <button class="btn-excl-check" onclick="copyExclCheck()" title="제외될 테이블 목록 조회 쿼리 복사 — 정상 테이블이 잘못 걸렸는지 실행해서 검증">제외 목록 확인쿼리 복사</button>
    </span>
  </div>
</header>
<div class="main">
  <div class="sidebar" id="sidebar"></div>
  <div class="content" id="content"></div>
</div>
<div id="toast"></div>

<script>
// ── 방언 정의 ────────────────────────────────────────────────
// 쿼리 키: tibero / mysql / pg / mssql / sybase. 없으면 화면에 "미작성" 표시
var DIALECTS = [
  { key:'tibero', label:'Tibero/Oracle', cls:'tibero',
    hint:'스키마 = OWNER (보통 대문자)' },
  { key:'mysql',  label:'MySQL/MariaDB', cls:'mysql',
    hint:'스키마 = 데이터베이스명 (TABLE_SCHEMA, 대소문자는 서버 설정 따름)' },
  { key:'pg',     label:'PostgreSQL', cls:'pg',
    hint:'스키마 = 네임스페이스 (보통 소문자, public 등)' },
  { key:'mssql',  label:'SQL Server', cls:'mssql',
    hint:'스키마 = sys.schemas.name (보통 dbo). DB는 USE로 선택' },
  { key:'sybase', label:'Sybase ASE', cls:'sybase',
    hint:'DB 단위로 USE 데이터베이스명 후 실행 — 스키마 입력칸 대부분 미사용. 코멘트 저장 개념 없어 한글명은 수기' }
];

// ── 문서 데이터 ──────────────────────────────────────────────
// formCols: 권장 열 구성 (참고 — 환경별 가감)
// sql[].q = { 방언키: 쿼리 }  /  __SCHEMAS__ → IN 목록 치환
var DOCS = [
{
  key:'d00', no:'00', label:'공통 준비',
  sub:'모든 문서 작업 전 1회. 스키마 확정이 최우선 — 이후 전 쿼리의 IN절이 여기서 결정됨.',
  sql:[
    { title:'업무 테이블의 스키마(DB) 분포 — 제일 먼저 실행',
      q:{
        tibero:"SELECT OWNER, COUNT(*) AS TBL_CNT\nFROM   ALL_TABLES\nGROUP  BY OWNER\nORDER  BY TBL_CNT DESC;",
        mysql:"SELECT TABLE_SCHEMA, COUNT(*) AS TBL_CNT\nFROM   information_schema.TABLES\nWHERE  TABLE_TYPE = 'BASE TABLE'\nGROUP  BY TABLE_SCHEMA\nORDER  BY TBL_CNT DESC;",
        pg:"SELECT schemaname, COUNT(*) AS tbl_cnt\nFROM   pg_tables\nGROUP  BY schemaname\nORDER  BY tbl_cnt DESC;",
        mssql:"SELECT s.name AS schema_name, COUNT(*) AS tbl_cnt\nFROM   sys.tables t JOIN sys.schemas s ON t.schema_id = s.schema_id\nGROUP  BY s.name\nORDER  BY tbl_cnt DESC;\n-- DB 여러 개면 USE DB명 바꿔가며 실행",
        sybase:"SELECT db_name() AS 현재DB, COUNT(*) AS tbl_cnt\nFROM   sysobjects WHERE type = 'U';\n-- DB별로 USE 데이터베이스명 후 각각 실행"
      } }
  ],
  notes:[
    '결과에서 업무 테이블 있는 스키마만 상단 입력칸에 등록 → 전 문서 쿼리 자동 반영',
    '관리자/시스템 계정 스키마는 시스템성 테이블 섞임 — 업무 스키마만 등록',
    '딕셔너리 뷰는 권한 있는 것만 보임. 툴 브라우저엔 보이는데 쿼리에 안 나오면 권한 요청',
    'DBeaver: 기본 200행만 로드 — 설정→데이터 편집기→ResultSet 페치 크기 200000 권장, 아니면 그리드에서 Ctrl+End',
    '결과 붙여넣기: 수백 행 = 그리드 Ctrl+A 복사, 수만 행 = CSV 내보내기(UTF-8 + BOM 체크)',
    '엑셀 서식: 데이터 먼저 값 붙여넣기 → 서식 행 복사 → 이름상자에 3:5000 → Ctrl+Alt+V → 서식(T)',
    '테이블 수 정합성: 01·02·03·04는 같은 시점에 추출'
  ]
},
{
  key:'d01', no:'01', label:'데이터베이스 정의서',
  sub:'DB 단위 1행 문서. 물리DB명·규모·환경 요약.',
  formCols:'기관명 | 부서명 | 적용업무 | DB설명 | 논리DB명 | 물리DB명 | DBMS명 | DBMS버전 | 운영체제명 | 테이블수 | 데이터용량',
  sql:[
    { title:'물리DB명 / 버전',
      q:{
        tibero:"SELECT NAME FROM V$DATABASE;\n-- 안 되면:\nSELECT SYS_CONTEXT('USERENV','DB_NAME') FROM DUAL;",
        mysql:"SELECT DATABASE() AS 현재DB, VERSION() AS 버전;\n-- 전체 DB 목록: SHOW DATABASES;",
        pg:"SELECT current_database() AS 현재DB, version() AS 버전;",
        mssql:"SELECT DB_NAME() AS 현재DB, @@VERSION AS 버전;",
        sybase:"SELECT db_name() AS 현재DB, @@version AS 버전;"
      } },
    { title:'테이블수 (02번 건수와 일치해야 함)',
      q:{
        tibero:"SELECT COUNT(*) AS TABLE_CNT\nFROM   ALL_TABLES\nWHERE  OWNER IN __SCHEMAS__;",
        mysql:"SELECT COUNT(*) AS TABLE_CNT\nFROM   information_schema.TABLES\nWHERE  TABLE_SCHEMA IN __SCHEMAS__ AND TABLE_TYPE = 'BASE TABLE';",
        pg:"-- 02번과 같은 기준(pg_class + 파티션 자식 제외)으로 세야 건수가 일치한다.\n-- information_schema.tables는 파티션 자식도 BASE TABLE로 세므로 쓰지 않는다.\nSELECT COUNT(*) AS table_cnt\nFROM   pg_class c JOIN pg_namespace n ON c.relnamespace = n.oid\nWHERE  c.relkind IN ('r','p') AND NOT c.relispartition\n       AND n.nspname IN __SCHEMAS__;\n-- PG 9.x는 relispartition 컬럼이 없음 → 그 조건 삭제 후 실행 (구버전엔 선언적 파티션도 없음)",
        mssql:"SELECT COUNT(*) AS table_cnt\nFROM   sys.tables t JOIN sys.schemas s ON t.schema_id = s.schema_id\nWHERE  s.name IN __SCHEMAS__;",
        sybase:"SELECT COUNT(*) AS table_cnt FROM sysobjects WHERE type = 'U';"
      } },
    { title:'데이터 용량',
      q:{
        tibero:"SELECT ROUND(SUM(BYTES)/1024/1024/1024, 1) || 'GB' AS DATA_SIZE\nFROM   DBA_SEGMENTS\nWHERE  OWNER IN __SCHEMAS__;\n-- DBA_ 권한 없으면 접속 계정 한정: USER_SEGMENTS",
        mysql:"SELECT CONCAT(ROUND(SUM(DATA_LENGTH + INDEX_LENGTH)/1024/1024/1024, 1), 'GB') AS DATA_SIZE\nFROM   information_schema.TABLES\nWHERE  TABLE_SCHEMA IN __SCHEMAS__;",
        pg:"SELECT pg_size_pretty(pg_database_size(current_database())) AS data_size;\n-- 스키마 한정:\nSELECT pg_size_pretty(SUM(pg_total_relation_size(quote_ident(schemaname)||'.'||quote_ident(tablename))))\nFROM   pg_tables WHERE schemaname IN __SCHEMAS__;",
        mssql:"EXEC sp_spaceused;  -- 현재 DB 전체\n-- 스키마 한정:\nSELECT CAST(ROUND(SUM(a.total_pages) * 8 / 1024.0 / 1024.0, 1) AS VARCHAR(20)) + 'GB'\nFROM   sys.partitions p\n       JOIN sys.allocation_units a ON p.partition_id = a.container_id\n       JOIN sys.tables t ON p.object_id = t.object_id\n       JOIN sys.schemas s ON t.schema_id = s.schema_id\nWHERE  s.name IN __SCHEMAS__;",
        sybase:"sp_spaceused;  -- 현재 DB 전체 사용량"
      } },
    { title:'인스턴스/환경 정보',
      q:{
        tibero:"-- DBMS버전 / 호스트 (Tibero V$INSTANCE 는 INSTANCE_NAME 있음 — 공식 레퍼런스 확인)\nSELECT INSTANCE_NAME, DB_NAME, HOST_NAME, VERSION, STATUS, STARTUP_TIME\nFROM   V$INSTANCE;\n\n-- 운영체제명 / CPU (SQL로 나온다 — 서버 담당자에게 안 물어봐도 됨)\nSELECT PLATFORM_NAME AS 운영체제명, CPU_NAME, CPU_MODEL\nFROM   V$DATABASE;\n-- 전체 컬럼이 궁금하면: SELECT * FROM V$INSTANCE;  /  SELECT * FROM V$DATABASE;",
        mysql:"SHOW VARIABLES LIKE 'version%';   -- version_compile_os에 OS 계열 표시",
        pg:"SELECT version();   -- 문자열 안에 컴파일 OS 표시 (예: linux-gnu)",
        mssql:"SELECT @@VERSION;   -- 문자열 안에 Windows/Linux 표기",
        sybase:"SELECT @@version;   -- 문자열 안에 플랫폼 표기"
      } }
  ],
  manual:[
    '기관명·부서명 등 조직 항목: 발주처 확인',
    '적용업무 분류체계: 기관 담당자 확인',
    'DBMS명/버전: 실제 엔진 그대로'
  ]
},
{
  key:'d02', no:'02', label:'테이블 정의서',
  sub:'테이블 1행. DB명 칸은 관례상 물리DB명이지만 스키마 분산 구조면 스키마명 기재 후 발주처 확인.',
  formCols:'순번 | DB명 | 테이블명(영문) | 테이블명(한글) | 테이블용도 | 관련엔터티명 | 테이블설명 | 보존기간 | 갱신주기 | 테이블볼륨(건) | 예상발생량(건) | 분류명 | 태그정보 | 담당부서 | 담당자 | 최초등록일 | 최종수정일 | 최종수정자 | 변경구분',
  sql:[
    { title:'한 방 쿼리 (순번/DB명=스키마/영문·한글명/볼륨/등록·수정일)',
      q:{
        tibero:"SELECT ROWNUM AS 순번, T.* FROM (\n    SELECT A.OWNER                                  AS DB명,\n           A.TABLE_NAME                             AS 테이블명_영문,\n           C.COMMENTS                               AS 테이블명_한글,\n           A.NUM_ROWS                               AS 테이블볼륨,  -- 통계 기준\n           TO_CHAR(O.CREATED, 'YYYY-MM-DD')         AS 최초등록일,\n           TO_CHAR(O.LAST_DDL_TIME, 'YYYY-MM-DD')   AS 최종수정일\n    FROM   ALL_TABLES A\n           LEFT JOIN ALL_TAB_COMMENTS C ON A.OWNER = C.OWNER\n                                       AND A.TABLE_NAME = C.TABLE_NAME\n           JOIN ALL_OBJECTS O ON O.OWNER = A.OWNER\n                             AND O.OBJECT_NAME = A.TABLE_NAME\n                             AND O.OBJECT_TYPE = 'TABLE'\n    WHERE  A.OWNER IN __SCHEMAS____EXCL(A.TABLE_NAME)__\n    ORDER  BY A.OWNER, A.TABLE_NAME\n) T;",
        mysql:"SELECT ROW_NUMBER() OVER (ORDER BY TABLE_SCHEMA, TABLE_NAME) AS 순번,\n       TABLE_SCHEMA        AS DB명,\n       TABLE_NAME          AS 테이블명_영문,\n       TABLE_COMMENT       AS 테이블명_한글,\n       TABLE_ROWS          AS 테이블볼륨,   -- 통계 기준(InnoDB 근사치)\n       DATE(CREATE_TIME)   AS 최초등록일,\n       DATE(UPDATE_TIME)   AS 최종수정일\nFROM   information_schema.TABLES\nWHERE  TABLE_SCHEMA IN __SCHEMAS__ AND TABLE_TYPE = 'BASE TABLE'__EXCL(TABLE_NAME)__\nORDER  BY TABLE_SCHEMA, TABLE_NAME;\n-- ROW_NUMBER()는 MySQL 8.0/MariaDB 10.2+ — 하위 버전이면 열 빼고 엑셀에서 연번",
        pg:"SELECT ROW_NUMBER() OVER (ORDER BY n.nspname, c.relname) AS 순번,\n       n.nspname                          AS DB명,\n       c.relname                          AS 테이블명_영문,\n       obj_description(c.oid, 'pg_class') AS 테이블명_한글,\n       c.reltuples::bigint                AS 테이블볼륨   -- 통계 기준\nFROM   pg_class c JOIN pg_namespace n ON c.relnamespace = n.oid\nWHERE  c.relkind IN ('r','p') AND NOT c.relispartition AND n.nspname IN __SCHEMAS____EXCL(c.relname)__\nORDER  BY n.nspname, c.relname;\n-- 생성/수정일: PG 딕셔너리엔 없음 — 마이그레이션 이력/담당자 확인\n-- 파티션 부모만 1건으로 집계(자식 제외) — 01번 테이블수와 같은 기준\n-- PG 9.x는 relispartition 컬럼 없음 → 그 조건 삭제 후 실행\n-- 파티션 부모의 reltuples는 0 → 볼륨은 자식 합계 필요: SELECT SUM(reltuples) ... WHERE relispartition",
        mssql:"SELECT ROW_NUMBER() OVER (ORDER BY s.name, t.name) AS 순번,\n       s.name                              AS DB명,\n       t.name                              AS 테이블명_영문,\n       CAST(ep.value AS NVARCHAR(200))     AS 테이블명_한글,\n       (SELECT SUM(p.rows) FROM sys.partitions p\n        WHERE  p.object_id = t.object_id AND p.index_id IN (0,1)) AS 테이블볼륨,\n       CONVERT(CHAR(10), t.create_date, 23) AS 최초등록일,\n       CONVERT(CHAR(10), t.modify_date, 23) AS 최종수정일\nFROM   sys.tables t\n       JOIN sys.schemas s ON t.schema_id = s.schema_id\n       LEFT JOIN sys.extended_properties ep ON ep.major_id = t.object_id\n            AND ep.minor_id = 0 AND ep.name = 'MS_Description'\nWHERE  s.name IN __SCHEMAS____EXCL(t.name)__\nORDER  BY s.name, t.name;",
        sybase:"-- systabstats는 인덱스(indid)별 1행 — 조인하면 테이블이 여러 행으로 늘 수 있어\n-- MAX + GROUP BY로 테이블당 1행 보장 (ASE 버전·APL/DOL 구조에 무관하게 안전)\nSELECT o.name        AS 테이블명_영문,\n       MAX(o.crdate) AS 최초등록일,\n       MAX(st.rowcnt) AS 테이블볼륨\nFROM   sysobjects o\n       LEFT JOIN systabstats st ON o.id = st.id AND st.indid IN (0,1)\nWHERE  o.type = 'U'__EXCL(o.name)__\nGROUP  BY o.name\nORDER  BY o.name;\n-- 건수 검증: SELECT COUNT(*) FROM sysobjects WHERE type = 'U'  ← 위 결과 행 수와 같아야 함\n-- 한글명: ASE는 코멘트 저장 개념 없음 — 설계서/수기\n-- DB별로 USE 데이터베이스명 후 실행"
      } }
  ],
  manual:[
    '★ 테이블볼륨은 옵티마이저 통계 기준 근사치 — 통계 미수집 테이블은 0 또는 -1이 그대로 찍힘.',
    '  Tibero/Oracle: ALL_TABLES.LAST_ANALYZED 가 NULL이거나 오래됐으면 값 신뢰 불가',
    '  PG: reltuples = -1(PG14+) 또는 0 이면 미수집 / MySQL: InnoDB TABLE_ROWS는 최대 ±50% 오차',
    '  → 0·NULL·이상값인 행만 골라 SELECT COUNT(*) 전수 조사로 채울 것 (전 테이블 COUNT는 비현실적)',
    '  → 통계 수집 권한 있으면: Oracle DBMS_STATS.GATHER_SCHEMA_STATS / PG ANALYZE / MySQL ANALYZE TABLE 후 재추출',
    '테이블용도: 기본 "일반", 코드성 "코드", 이력성(_HIST 등) "이력", 통계성 "통계"',
    '관련엔터티명: 테이블 한글명 재사용 (04 관계정의서와 일치)',
    '보존기간: 내부 데이터 보존 정책 따름, 기준 없으면 "영구"',
    '갱신주기: 트랜잭션 "실시간" / 배치·통계 "일"·"월" / 코드 "수시"',
    '예상발생량: 등록일시 컬럼 있으면 최근 1년 COUNT, 없으면 추정 표기',
    '분류명: 01번 적용업무(BRM)와 통일 / DB명: 01번과 연결되게 통일',
    '최종수정자 = 문서 작성자 (DB의 DDL 실행자는 딕셔너리에 기록 안 됨) / 변경구분: 최초 제출 전 행 "신규"',
    'MySQL 최종수정일(UPDATE_TIME)은 서버 재시작·공유 테이블스페이스에서 NULL로 리셋 — 빈 값이면 DDL 이력/작성일로 수기 (통계 근사치와 별개 함정)',
    '한글명 NULL인 행 = 코멘트 미등록 테이블 → 직접 명명 + 표시'
  ]
},
{
  key:'d03', no:'03', label:'컬럼 정의서',
  sub:'컬럼 1행. 수만 행 가능 → CSV(UTF-8+BOM) 권장.',
  formCols:'순번 | DB명 | 테이블명 | 컬럼명(영문) | 컬럼명(한글) | 연관엔터티명 | 연관속성명 | Not Null | 데이터타입 | 데이터길이 | 기본값 | PK정보 | 컬럼설명 | (담당·수정일·변경구분 tail은 02와 동일)',
  sql:[
    { title:'한 방 쿼리 (권장 열 구성 맞춤, PK Y/N 포함)',
      q:{
        tibero:"SELECT ROWNUM AS 순번, T.* FROM (\n    SELECT A.OWNER                                   AS DB명,\n           A.TABLE_NAME                              AS 테이블명,\n           A.COLUMN_NAME                             AS 컬럼명_영문,\n           CC.COMMENTS                               AS 컬럼명_한글,\n           TC.COMMENTS                               AS 연관엔터티명,\n           CC.COMMENTS                               AS 연관속성명,\n           DECODE(A.NULLABLE, 'N', 'Y', 'N')         AS NOT_NULL,\n           A.DATA_TYPE                               AS 데이터타입,\n           CASE WHEN A.DATA_TYPE LIKE '%CHAR%'      THEN A.CHAR_LENGTH        -- 문자: 바이트 아닌 문자 수\n                WHEN A.DATA_TYPE IN ('NUMBER','FLOAT') THEN A.DATA_PRECISION  -- 미지정 NUMBER는 NULL (22 아님)\n                WHEN A.DATA_TYPE LIKE 'DATE%' OR A.DATA_TYPE LIKE 'TIMESTAMP%' OR A.DATA_TYPE LIKE 'INTERVAL%' THEN NULL\n                ELSE A.DATA_LENGTH END               AS 데이터길이,\n           A.DATA_SCALE                              AS 소수점길이,\n           NVL2(PK.COLUMN_NAME, 'Y', 'N')            AS PK정보,\n           CC.COMMENTS                               AS 컬럼설명\n    FROM   ALL_TAB_COLUMNS A\n           JOIN ALL_TABLES TB ON TB.OWNER = A.OWNER              -- 뷰 컬럼 제외 (02와 건수 정합)\n                             AND TB.TABLE_NAME = A.TABLE_NAME\n           LEFT JOIN ALL_COL_COMMENTS CC ON A.OWNER = CC.OWNER\n                  AND A.TABLE_NAME = CC.TABLE_NAME AND A.COLUMN_NAME = CC.COLUMN_NAME\n           LEFT JOIN ALL_TAB_COMMENTS TC ON A.OWNER = TC.OWNER\n                  AND A.TABLE_NAME = TC.TABLE_NAME\n           LEFT JOIN (SELECT C.OWNER, K.TABLE_NAME, K.COLUMN_NAME\n                      FROM   ALL_CONSTRAINTS C\n                             JOIN ALL_CONS_COLUMNS K ON C.OWNER = K.OWNER\n                                  AND C.CONSTRAINT_NAME = K.CONSTRAINT_NAME\n                      WHERE  C.CONSTRAINT_TYPE = 'P') PK\n                  ON PK.OWNER = A.OWNER AND PK.TABLE_NAME = A.TABLE_NAME\n                     AND PK.COLUMN_NAME = A.COLUMN_NAME\n    WHERE  A.OWNER IN __SCHEMAS____EXCL(A.TABLE_NAME)__\n    ORDER  BY A.OWNER, A.TABLE_NAME, A.COLUMN_ID\n) T;\n-- 기본값(DEFAULT): ALL_TAB_COLUMNS.DATA_DEFAULT는 LONG형 — 위 ROWNUM 인라인뷰에 넣으면 ORA-00997.\n-- 별도 추출 후 엑셀 병합: SELECT OWNER, TABLE_NAME, COLUMN_NAME, DATA_DEFAULT FROM ALL_TAB_COLUMNS WHERE OWNER IN __SCHEMAS____EXCLI(TABLE_NAME)__;",
        mysql:"SELECT ROW_NUMBER() OVER (ORDER BY c.TABLE_SCHEMA, c.TABLE_NAME, c.ORDINAL_POSITION) AS 순번,\n       c.TABLE_SCHEMA                                      AS DB명,\n       c.TABLE_NAME                                        AS 테이블명,\n       c.COLUMN_NAME                                       AS 컬럼명_영문,\n       c.COLUMN_COMMENT                                    AS 컬럼명_한글,\n       IF(c.IS_NULLABLE = 'NO', 'Y', 'N')                  AS NOT_NULL,\n       c.DATA_TYPE                                         AS 데이터타입,\n       COALESCE(c.CHARACTER_MAXIMUM_LENGTH, c.NUMERIC_PRECISION) AS 데이터길이,\n       c.COLUMN_DEFAULT                                   AS 기본값,\n       IF(c.COLUMN_KEY = 'PRI', 'Y', 'N')                  AS PK정보,\n       c.COLUMN_COMMENT                                    AS 컬럼설명\nFROM   information_schema.COLUMNS c\n       JOIN information_schema.TABLES t                    -- 뷰 컬럼 제외\n            ON t.TABLE_SCHEMA = c.TABLE_SCHEMA AND t.TABLE_NAME = c.TABLE_NAME\n           AND t.TABLE_TYPE = 'BASE TABLE'\nWHERE  c.TABLE_SCHEMA IN __SCHEMAS____EXCL(c.TABLE_NAME)__\nORDER  BY c.TABLE_SCHEMA, c.TABLE_NAME, c.ORDINAL_POSITION;",
        pg:"SELECT ROW_NUMBER() OVER (ORDER BY n.nspname, c.relname, a.attnum) AS 순번,\n       n.nspname                              AS DB명,\n       c.relname                              AS 테이블명,\n       a.attname                              AS 컬럼명_영문,\n       col_description(c.oid, a.attnum)       AS 컬럼명_한글,\n       CASE WHEN a.attnotnull THEN 'Y' ELSE 'N' END AS NOT_NULL,\n       format_type(a.atttypid, a.atttypmod)   AS 데이터타입,   -- 길이 포함 (예: varchar(100))\n       pg_get_expr(ad.adbin, ad.adrelid)      AS 기본값,\n       CASE WHEN pk.attnum IS NOT NULL THEN 'Y' ELSE 'N' END AS PK정보,\n       col_description(c.oid, a.attnum)       AS 컬럼설명\nFROM   pg_attribute a\n       JOIN pg_class c     ON a.attrelid = c.oid AND c.relkind IN ('r','p') AND NOT c.relispartition   -- 테이블만(뷰 제외) + 파티션 자식 중복 제거\n       JOIN pg_namespace n ON c.relnamespace = n.oid\n       LEFT JOIN (SELECT i.indrelid, unnest(i.indkey) AS attnum\n                  FROM   pg_index i WHERE i.indisprimary) pk\n              ON pk.indrelid = c.oid AND pk.attnum = a.attnum\n       LEFT JOIN pg_attrdef ad ON ad.adrelid = c.oid AND ad.adnum = a.attnum\nWHERE  a.attnum > 0 AND NOT a.attisdropped\n       AND n.nspname IN __SCHEMAS____EXCL(c.relname)__\nORDER  BY n.nspname, c.relname, a.attnum;\n-- pg_catalog 직접 조회 — 삭제된 컬럼 이력 있어도 코멘트가 정확한 컬럼에 붙음",
        mssql:"SELECT ROW_NUMBER() OVER (ORDER BY s.name, t.name, c.column_id) AS 순번,\n       s.name                              AS DB명,\n       t.name                              AS 테이블명,\n       c.name                              AS 컬럼명_영문,\n       CAST(ep.value AS NVARCHAR(200))     AS 컬럼명_한글,\n       CASE WHEN c.is_nullable = 0 THEN 'Y' ELSE 'N' END AS NOT_NULL,\n       ty.name                             AS 데이터타입,\n       CASE WHEN c.max_length = -1 THEN NULL                            -- varchar(max)\n            WHEN ty.name LIKE 'n%' AND (ty.name LIKE '%char%' OR ty.name LIKE '%text%')\n                 THEN c.max_length / 2                                  -- N타입은 바이트/2 = 문자 수\n            WHEN ty.name LIKE '%char%' OR ty.name LIKE '%binary%' THEN c.max_length\n            WHEN ty.name IN ('decimal','numeric') THEN c.precision\n            ELSE NULL END                  AS 데이터길이,               -- 날짜/정수는 길이 개념 없음\n       CASE WHEN ty.name IN ('decimal','numeric') THEN c.scale ELSE NULL END AS 소수점길이,\n       dc.definition                       AS 기본값,\n       CASE WHEN pk.column_id IS NOT NULL THEN 'Y' ELSE 'N' END AS PK정보\nFROM   sys.columns c\n       JOIN sys.tables t  ON c.object_id = t.object_id\n       JOIN sys.schemas s ON t.schema_id = s.schema_id\n       JOIN sys.types ty  ON c.user_type_id = ty.user_type_id\n       LEFT JOIN sys.extended_properties ep ON ep.major_id = c.object_id\n            AND ep.minor_id = c.column_id AND ep.name = 'MS_Description'\n       LEFT JOIN (SELECT ic.object_id, ic.column_id\n                  FROM   sys.index_columns ic\n                         JOIN sys.indexes i ON ic.object_id = i.object_id\n                              AND ic.index_id = i.index_id\n                  WHERE  i.is_primary_key = 1) pk\n              ON pk.object_id = c.object_id AND pk.column_id = c.column_id\n       LEFT JOIN sys.default_constraints dc ON dc.object_id = c.default_object_id\nWHERE  s.name IN __SCHEMAS____EXCL(t.name)__\nORDER  BY s.name, t.name, c.column_id;",
        sybase:"SELECT o.name    AS 테이블명,\n       c.name    AS 컬럼명_영문,\n       t.name    AS 데이터타입,\n       c.length  AS 데이터길이,\n       CASE WHEN (c.status & 8) = 8 THEN 'N' ELSE 'Y' END AS NOT_NULL\nFROM   sysobjects o\n       JOIN syscolumns c ON o.id = c.id\n       JOIN systypes  t ON c.usertype = t.usertype\nWHERE  o.type = 'U'__EXCL(o.name)__\nORDER  BY o.name, c.colid;\n-- 한글명 없음(코멘트 미지원) — 수기. PK는 sp_helpconstraint 테이블명 으로 확인\n-- 기본값(DEFAULT): syscolumns.cdefault→syscomments 조인 필요(ASE 버전차 큼) — 설계서 확인"
      } }
  ],
  manual:[
    '소수점 필요 시 SCALE 열 추가 (편집 모드): Tibero DATA_SCALE / MySQL NUMERIC_SCALE / PG numeric_scale / MSSQL c.scale',
    '기본값(DEFAULT): MySQL COLUMN_DEFAULT / PG pg_attrdef(pg_get_expr) / MSSQL default_constraints.definition. Oracle는 DATA_DEFAULT가 LONG형이라 ROWNUM 인라인뷰서 ORA-00997 → 별도 추출 병합(쿼리 하단 주석). Sybase는 syscomments(버전차) → 설계서',
    'NOT_NULL 정의: NULL 불가 → Y (열이 "NotNull 여부"면 — 반대로 적지 말 것)',
    '연관엔터티/속성명 = 한글명 재사용이 관례 (논리모델 별도 있으면 그걸로)'
  ]
},
{
  key:'d04', no:'04', label:'테이블 관계 정의서',
  sub:'FK 관계를 부모/자식 테이블·컬럼 단위로 기재. 모델링 도구 있으면 ERD 이미지 제출로 갈음되는 경우도 많음 — 발주처 확인.',
  formCols:'순번 | 부모: 영문DB명·테이블소유자·한글테이블명·영문테이블명·한글컬럼명·영문컬럼명 | 자식: (동일 6열) | 삭제규칙 | 갱신규칙',
  sql:[
    { title:'FK 기준 한 방 쿼리 (부모/자식 각 6열)',
      q:{
        tibero:"SELECT ROWNUM AS 순번, T.* FROM (\n    SELECT RC.OWNER          AS 부모_영문DB명,\n           RC.OWNER          AS 부모_테이블소유자,\n           PTC.COMMENTS      AS 부모_한글테이블명,\n           RC.TABLE_NAME     AS 부모_영문테이블명,\n           PCC.COMMENTS      AS 부모_한글컬럼명,\n           RCC.COLUMN_NAME   AS 부모_영문컬럼명,\n           C.OWNER           AS 자식_영문DB명,\n           C.OWNER           AS 자식_테이블소유자,\n           CTC.COMMENTS      AS 자식_한글테이블명,\n           C.TABLE_NAME      AS 자식_영문테이블명,\n           CCC.COMMENTS      AS 자식_한글컬럼명,\n           CC.COLUMN_NAME    AS 자식_영문컬럼명,\n           C.DELETE_RULE     AS 삭제규칙,\n           'NO ACTION'       AS 갱신규칙   -- Oracle/Tibero는 ON UPDATE 미지원(갱신 고정)\n    FROM   ALL_CONSTRAINTS C\n           JOIN ALL_CONS_COLUMNS CC   ON C.OWNER = CC.OWNER\n                AND C.CONSTRAINT_NAME = CC.CONSTRAINT_NAME\n           JOIN ALL_CONSTRAINTS RC    ON C.R_OWNER = RC.OWNER\n                AND C.R_CONSTRAINT_NAME = RC.CONSTRAINT_NAME\n           JOIN ALL_CONS_COLUMNS RCC  ON RC.OWNER = RCC.OWNER\n                AND RC.CONSTRAINT_NAME = RCC.CONSTRAINT_NAME AND CC.POSITION = RCC.POSITION\n           LEFT JOIN ALL_TAB_COMMENTS PTC ON RC.OWNER = PTC.OWNER AND RC.TABLE_NAME = PTC.TABLE_NAME\n           LEFT JOIN ALL_COL_COMMENTS PCC ON RC.OWNER = PCC.OWNER\n                AND RC.TABLE_NAME = PCC.TABLE_NAME AND RCC.COLUMN_NAME = PCC.COLUMN_NAME\n           LEFT JOIN ALL_TAB_COMMENTS CTC ON C.OWNER = CTC.OWNER AND C.TABLE_NAME = CTC.TABLE_NAME\n           LEFT JOIN ALL_COL_COMMENTS CCC ON C.OWNER = CCC.OWNER\n                AND C.TABLE_NAME = CCC.TABLE_NAME AND CC.COLUMN_NAME = CCC.COLUMN_NAME\n    WHERE  C.CONSTRAINT_TYPE = 'R'\n           AND C.OWNER IN __SCHEMAS__\n    ORDER  BY C.OWNER, C.TABLE_NAME, C.CONSTRAINT_NAME, CC.POSITION\n) T;",
        mysql:"SELECT ROW_NUMBER() OVER (ORDER BY k.CONSTRAINT_NAME, k.ORDINAL_POSITION) AS 순번,\n       k.REFERENCED_TABLE_SCHEMA  AS 부모_영문DB명,\n       k.REFERENCED_TABLE_SCHEMA  AS 부모_테이블소유자,\n       pt.TABLE_COMMENT           AS 부모_한글테이블명,\n       k.REFERENCED_TABLE_NAME    AS 부모_영문테이블명,\n       pc.COLUMN_COMMENT          AS 부모_한글컬럼명,\n       k.REFERENCED_COLUMN_NAME   AS 부모_영문컬럼명,\n       k.TABLE_SCHEMA             AS 자식_영문DB명,\n       k.TABLE_SCHEMA             AS 자식_테이블소유자,\n       ct.TABLE_COMMENT           AS 자식_한글테이블명,\n       k.TABLE_NAME               AS 자식_영문테이블명,\n       cc.COLUMN_COMMENT          AS 자식_한글컬럼명,\n       k.COLUMN_NAME              AS 자식_영문컬럼명,\n       rc.DELETE_RULE            AS 삭제규칙,\n       rc.UPDATE_RULE            AS 갱신규칙\nFROM   information_schema.KEY_COLUMN_USAGE k\n       LEFT JOIN information_schema.TABLES pt ON pt.TABLE_SCHEMA = k.REFERENCED_TABLE_SCHEMA\n            AND pt.TABLE_NAME = k.REFERENCED_TABLE_NAME\n       LEFT JOIN information_schema.COLUMNS pc ON pc.TABLE_SCHEMA = k.REFERENCED_TABLE_SCHEMA\n            AND pc.TABLE_NAME = k.REFERENCED_TABLE_NAME AND pc.COLUMN_NAME = k.REFERENCED_COLUMN_NAME\n       LEFT JOIN information_schema.TABLES ct ON ct.TABLE_SCHEMA = k.TABLE_SCHEMA\n            AND ct.TABLE_NAME = k.TABLE_NAME\n       LEFT JOIN information_schema.COLUMNS cc ON cc.TABLE_SCHEMA = k.TABLE_SCHEMA\n            AND cc.TABLE_NAME = k.TABLE_NAME AND cc.COLUMN_NAME = k.COLUMN_NAME\n       LEFT JOIN information_schema.REFERENTIAL_CONSTRAINTS rc\n            ON rc.CONSTRAINT_SCHEMA = k.TABLE_SCHEMA AND rc.CONSTRAINT_NAME = k.CONSTRAINT_NAME\nWHERE  k.REFERENCED_TABLE_NAME IS NOT NULL\n       AND k.TABLE_SCHEMA IN __SCHEMAS__\nORDER  BY k.CONSTRAINT_NAME, k.ORDINAL_POSITION;",
        pg:"SELECT ROW_NUMBER() OVER (ORDER BY con.conname, k.ord) AS 순번,\n       pn.nspname                          AS 부모_영문DB명,\n       pn.nspname                          AS 부모_테이블소유자,\n       obj_description(pc.oid, 'pg_class') AS 부모_한글테이블명,\n       pc.relname                          AS 부모_영문테이블명,\n       col_description(pc.oid, k.confkey)  AS 부모_한글컬럼명,\n       pa.attname                          AS 부모_영문컬럼명,\n       cn.nspname                          AS 자식_영문DB명,\n       cn.nspname                          AS 자식_테이블소유자,\n       obj_description(cc.oid, 'pg_class') AS 자식_한글테이블명,\n       cc.relname                          AS 자식_영문테이블명,\n       col_description(cc.oid, k.conkey)   AS 자식_한글컬럼명,\n       ca.attname                          AS 자식_영문컬럼명,\n       CASE con.confdeltype WHEN 'a' THEN 'NO ACTION' WHEN 'r' THEN 'RESTRICT' WHEN 'c' THEN 'CASCADE' WHEN 'n' THEN 'SET NULL' WHEN 'd' THEN 'SET DEFAULT' END AS 삭제규칙,\n       CASE con.confupdtype WHEN 'a' THEN 'NO ACTION' WHEN 'r' THEN 'RESTRICT' WHEN 'c' THEN 'CASCADE' WHEN 'n' THEN 'SET NULL' WHEN 'd' THEN 'SET DEFAULT' END AS 갱신규칙\nFROM   pg_constraint con\n       CROSS JOIN LATERAL unnest(con.conkey, con.confkey)\n                  WITH ORDINALITY AS k(conkey, confkey, ord)\n       JOIN pg_class cc     ON con.conrelid = cc.oid\n       JOIN pg_namespace cn ON cc.relnamespace = cn.oid\n       JOIN pg_class pc     ON con.confrelid = pc.oid\n       JOIN pg_namespace pn ON pc.relnamespace = pn.oid\n       JOIN pg_attribute ca ON ca.attrelid = cc.oid AND ca.attnum = k.conkey\n       JOIN pg_attribute pa ON pa.attrelid = pc.oid AND pa.attnum = k.confkey\nWHERE  con.contype = 'f' AND cn.nspname IN __SCHEMAS__\nORDER  BY con.conname, k.ord;\n-- 복합 FK도 컬럼 짝 정확 (unnest WITH ORDINALITY, PG 9.4+) + 한글명 포함",
        mssql:"SELECT ROW_NUMBER() OVER (ORDER BY fk.name, fkc.constraint_column_id) AS 순번,\n       SCHEMA_NAME(pt.schema_id)         AS 부모_영문DB명,\n       SCHEMA_NAME(pt.schema_id)         AS 부모_테이블소유자,\n       CAST(ptd.value AS NVARCHAR(200))  AS 부모_한글테이블명,\n       pt.name                           AS 부모_영문테이블명,\n       CAST(pcd.value AS NVARCHAR(200))  AS 부모_한글컬럼명,\n       pc.name                           AS 부모_영문컬럼명,\n       SCHEMA_NAME(ct.schema_id)         AS 자식_영문DB명,\n       SCHEMA_NAME(ct.schema_id)         AS 자식_테이블소유자,\n       CAST(ctd.value AS NVARCHAR(200))  AS 자식_한글테이블명,\n       ct.name                           AS 자식_영문테이블명,\n       CAST(ccd.value AS NVARCHAR(200))  AS 자식_한글컬럼명,\n       cc.name                           AS 자식_영문컬럼명,\n       fk.delete_referential_action_desc AS 삭제규칙,\n       fk.update_referential_action_desc AS 갱신규칙\nFROM   sys.foreign_key_columns fkc\n       JOIN sys.foreign_keys fk ON fkc.constraint_object_id = fk.object_id\n       JOIN sys.tables pt  ON fkc.referenced_object_id = pt.object_id\n       JOIN sys.columns pc ON pc.object_id = pt.object_id AND pc.column_id = fkc.referenced_column_id\n       JOIN sys.tables ct  ON fkc.parent_object_id = ct.object_id\n       JOIN sys.columns cc ON cc.object_id = ct.object_id AND cc.column_id = fkc.parent_column_id\n       LEFT JOIN sys.extended_properties ptd ON ptd.major_id = pt.object_id AND ptd.minor_id = 0 AND ptd.name = 'MS_Description'\n       LEFT JOIN sys.extended_properties pcd ON pcd.major_id = pt.object_id AND pcd.minor_id = pc.column_id AND pcd.name = 'MS_Description'\n       LEFT JOIN sys.extended_properties ctd ON ctd.major_id = ct.object_id AND ctd.minor_id = 0 AND ctd.name = 'MS_Description'\n       LEFT JOIN sys.extended_properties ccd ON ccd.major_id = ct.object_id AND ccd.minor_id = cc.column_id AND ccd.name = 'MS_Description'\nWHERE  SCHEMA_NAME(ct.schema_id) IN __SCHEMAS__\nORDER  BY fk.name, fkc.constraint_column_id;",
        sybase:"-- 테이블 단위 FK 존재 여부 (컬럼 매핑은 sp_helpconstraint로)\nSELECT object_name(r.reftabid) AS 부모테이블,\n       object_name(r.tableid)  AS 자식테이블\nFROM   sysreferences r;\n\nsp_helpconstraint 테이블명;   -- 테이블별 상세 (컬럼 매핑 + 삭제/갱신규칙 포함)"
      } },
    { title:'FK 0건일 때 — 추정 관계 후보 (PK 컬럼명이 타 테이블에 존재)',
      q:{
        tibero:"SELECT PK.OWNER, PK.TABLE_NAME AS 부모후보, PK.COLUMN_NAME AS 조인컬럼,\n       C.TABLE_NAME AS 자식후보\nFROM   (SELECT C.OWNER, K.TABLE_NAME, K.COLUMN_NAME\n        FROM   ALL_CONSTRAINTS C\n               JOIN ALL_CONS_COLUMNS K ON C.OWNER = K.OWNER\n                    AND C.CONSTRAINT_NAME = K.CONSTRAINT_NAME\n        WHERE  C.CONSTRAINT_TYPE = 'P') PK\n       JOIN ALL_TAB_COLUMNS C ON C.OWNER = PK.OWNER\n            AND C.COLUMN_NAME = PK.COLUMN_NAME AND C.TABLE_NAME <> PK.TABLE_NAME\nWHERE  PK.OWNER IN __SCHEMAS__\nORDER  BY PK.TABLE_NAME, C.TABLE_NAME;",
        mysql:"SELECT p.TABLE_SCHEMA, p.TABLE_NAME AS 부모후보, p.COLUMN_NAME AS 조인컬럼,\n       c.TABLE_NAME AS 자식후보\nFROM   information_schema.COLUMNS p\n       JOIN information_schema.COLUMNS c ON c.TABLE_SCHEMA = p.TABLE_SCHEMA\n            AND c.COLUMN_NAME = p.COLUMN_NAME AND c.TABLE_NAME <> p.TABLE_NAME\nWHERE  p.COLUMN_KEY = 'PRI' AND p.TABLE_SCHEMA IN __SCHEMAS__\nORDER  BY p.TABLE_NAME, c.TABLE_NAME;",
        pg:"SELECT pk.table_schema, pk.table_name AS 부모후보, pk.column_name AS 조인컬럼,\n       c.table_name AS 자식후보\nFROM   (SELECT tc.table_schema, tc.table_name, kcu.column_name\n        FROM   information_schema.table_constraints tc\n               JOIN information_schema.key_column_usage kcu\n                    ON tc.constraint_name = kcu.constraint_name\n                   AND tc.table_schema = kcu.table_schema\n        WHERE  tc.constraint_type = 'PRIMARY KEY') pk\n       JOIN information_schema.columns c ON c.table_schema = pk.table_schema\n            AND c.column_name = pk.column_name AND c.table_name <> pk.table_name\nWHERE  pk.table_schema IN __SCHEMAS__\nORDER  BY pk.table_name, c.table_name;",
        mssql:"SELECT s.name, pt.name AS 부모후보, pc.name AS 조인컬럼, t2.name AS 자식후보\nFROM   sys.index_columns ic\n       JOIN sys.indexes i ON ic.object_id = i.object_id AND ic.index_id = i.index_id\n            AND i.is_primary_key = 1\n       JOIN sys.tables pt ON ic.object_id = pt.object_id\n       JOIN sys.schemas s ON pt.schema_id = s.schema_id\n       JOIN sys.columns pc ON pc.object_id = ic.object_id AND pc.column_id = ic.column_id\n       JOIN sys.columns c2 ON c2.name = pc.name AND c2.object_id <> pc.object_id\n       JOIN sys.tables t2 ON c2.object_id = t2.object_id AND t2.schema_id = pt.schema_id\nWHERE  s.name IN __SCHEMAS__\nORDER  BY pt.name, t2.name;",
        sybase:"-- ASE는 조인 폭발 위험 — 컬럼명 목록 뽑아 엑셀에서 매칭 권장\nSELECT o.name AS 테이블명, c.name AS 컬럼명\nFROM   sysobjects o JOIN syscolumns c ON o.id = c.id\nWHERE  o.type = 'U'\nORDER  BY c.name, o.name;"
      } }
  ],
  manual:[
    'FK 0건이면 (국내 SI DB 흔함) 추정 쿼리 후보에서 실제 관계만 선별 → "논리적 관계(FK 미설정)" 표기',
    '모델링 도구(ERwin 등) 사용 가능하면 리버스 엔지니어링 → ERD 캡처 제출이 수기 작성보다 빠름',
    '추정 후보는 공통코드성 컬럼(등록자ID 등)이 대량 매칭됨 — 기계적으로 다 넣지 말 것',
    'FK 삭제/갱신규칙(CASCADE·RESTRICT·SET NULL·NO ACTION) = 데이터 삭제정책 근거. Oracle/Tibero는 ON UPDATE 미지원이라 갱신규칙 NO ACTION 고정. Sybase는 sp_helpconstraint로 확인'
  ]
},
{
  key:'d05', no:'07', label:'DB 표준용어',
  sub:'원본 표준사전 없으면 컬럼명·코멘트에서 역추출. 용어 = 컬럼 단위 개념.',
  formCols:'순번 | 기관명 | DB명 | 표준용어명 | 영문명 | 영문약어명 | 용어설명 | 표준도메인명 | 허용값 | 관리부서명 | 표준코드명 | 업무분야 | 행정표준코드명 | 제정일자 | 특이사항',
  sql:[
    { title:'용어 역추출 (코멘트=용어명, 컬럼명=영문약어명)',
      q:{
        tibero:"-- 용어 1개 = 컬럼명 1개 (컬럼명으로만 GROUP BY — 코멘트로 묶으면 같은 컬럼이 여러 행으로 쪼개짐)\nSELECT MIN(A.OWNER)                                       AS DB명,\n       NVL(MIN(B.COMMENTS), '(코멘트 없음)')              AS 표준용어명,\n       A.COLUMN_NAME                                      AS 영문약어명,\n       NVL(MIN(B.COMMENTS), '(코멘트 없음)')              AS 용어설명,\n       MIN(A.DATA_TYPE || CASE WHEN A.DATA_TYPE LIKE '%CHAR%'        THEN '(' || A.CHAR_LENGTH || ')'\n                               WHEN A.DATA_PRECISION IS NOT NULL     THEN '(' || A.DATA_PRECISION || ')'\n                               ELSE '' END)               AS 도메인후보,\n       COUNT(*)                                           AS 사용횟수,        -- 검증용, 제출 시 삭제\n       COUNT(DISTINCT B.COMMENTS)                         AS 코멘트종류수     -- 2 이상 = 표준화 안 된 컬럼\nFROM   ALL_TAB_COLUMNS A\n       JOIN ALL_TABLES TB ON TB.OWNER = A.OWNER AND TB.TABLE_NAME = A.TABLE_NAME   -- 뷰 컬럼 제외\n       LEFT JOIN ALL_COL_COMMENTS B ON A.OWNER = B.OWNER\n              AND A.TABLE_NAME = B.TABLE_NAME AND A.COLUMN_NAME = B.COLUMN_NAME\nWHERE  A.OWNER IN __SCHEMAS__\nGROUP  BY A.COLUMN_NAME\nORDER  BY A.COLUMN_NAME;",
        mysql:"-- MySQL은 코멘트 없으면 NULL이 아니라 빈 문자열 → NULLIF로 걸러야 함\nSELECT MIN(c.TABLE_SCHEMA)                                AS DB명,\n       COALESCE(NULLIF(MIN(c.COLUMN_COMMENT), ''), '(코멘트 없음)') AS 표준용어명,\n       c.COLUMN_NAME                                      AS 영문약어명,\n       COALESCE(NULLIF(MIN(c.COLUMN_COMMENT), ''), '(코멘트 없음)') AS 용어설명,\n       MIN(c.COLUMN_TYPE)                                 AS 도메인후보,\n       COUNT(*)                                           AS 사용횟수,\n       COUNT(DISTINCT NULLIF(c.COLUMN_COMMENT, ''))       AS 코멘트종류수\nFROM   information_schema.COLUMNS c\n       JOIN information_schema.TABLES t                    -- 뷰 컬럼 제외\n            ON t.TABLE_SCHEMA = c.TABLE_SCHEMA AND t.TABLE_NAME = c.TABLE_NAME\n           AND t.TABLE_TYPE = 'BASE TABLE'\nWHERE  c.TABLE_SCHEMA IN __SCHEMAS__\nGROUP  BY c.COLUMN_NAME\nORDER  BY c.COLUMN_NAME;",
        pg:"SELECT MIN(n.nspname)                                     AS DB명,\n       COALESCE(MIN(col_description(c.oid, a.attnum)), '(코멘트 없음)') AS 표준용어명,\n       a.attname                                          AS 영문약어명,\n       COALESCE(MIN(col_description(c.oid, a.attnum)), '(코멘트 없음)') AS 용어설명,\n       MIN(format_type(a.atttypid, a.atttypmod))          AS 도메인후보,\n       COUNT(*)                                           AS 사용횟수,\n       COUNT(DISTINCT col_description(c.oid, a.attnum))   AS 코멘트종류수\nFROM   pg_attribute a\n       JOIN pg_class c     ON a.attrelid = c.oid AND c.relkind IN ('r','p') AND NOT c.relispartition   -- 파티션 부모만 (자식 중복 제거)\n       JOIN pg_namespace n ON c.relnamespace = n.oid\nWHERE  a.attnum > 0 AND NOT a.attisdropped\n       AND n.nspname IN __SCHEMAS__\nGROUP  BY a.attname\nORDER  BY a.attname;",
        mssql:"SELECT MIN(s.name)                                        AS DB명,\n       ISNULL(MIN(CAST(ep.value AS NVARCHAR(4000))), '(코멘트 없음)') AS 표준용어명,\n       c.name                                             AS 영문약어명,\n       ISNULL(MIN(CAST(ep.value AS NVARCHAR(4000))), '(코멘트 없음)') AS 용어설명,\n       MIN(ty.name + CASE WHEN ty.name LIKE '%char%' OR ty.name LIKE '%binary%'\n                          THEN '(' + CASE WHEN c.max_length = -1 THEN 'max'\n                                          WHEN ty.name LIKE 'n%' THEN CAST(c.max_length/2 AS VARCHAR(10))  -- N타입은 바이트/2 = 문자 수\n                                          ELSE CAST(c.max_length AS VARCHAR(10)) END + ')'\n                          WHEN ty.name IN ('decimal','numeric')\n                          THEN '(' + CAST(c.precision AS VARCHAR(10)) + ',' + CAST(c.scale AS VARCHAR(10)) + ')'\n                          ELSE '' END)                    AS 도메인후보,\n       COUNT(*)                                           AS 사용횟수,\n       COUNT(DISTINCT CAST(ep.value AS NVARCHAR(4000)))   AS 코멘트종류수   -- 200자로 자르면 서로 다른 코멘트가 같게 세임\nFROM   sys.columns c\n       JOIN sys.tables t  ON c.object_id = t.object_id\n       JOIN sys.schemas s ON t.schema_id = s.schema_id\n       JOIN sys.types ty  ON c.user_type_id = ty.user_type_id\n       LEFT JOIN sys.extended_properties ep ON ep.major_id = c.object_id\n            AND ep.minor_id = c.column_id AND ep.name = 'MS_Description'\nWHERE  s.name IN __SCHEMAS__\nGROUP  BY c.name\nORDER  BY c.name;",
        sybase:"-- ASE는 코멘트 저장 개념 없음 → 표준용어명/용어설명은 설계서 기준 수기\nSELECT db_name()          AS DB명,\n       '(코멘트 미지원)'  AS 표준용어명,\n       c.name             AS 영문약어명,\n       '(코멘트 미지원)'  AS 용어설명,\n       MIN(t.name)        AS 도메인후보,\n       COUNT(*)           AS 사용횟수\nFROM   sysobjects o\n       JOIN syscolumns c ON o.id = c.id\n       JOIN systypes   t ON c.usertype = t.usertype\nWHERE  o.type = 'U'\nGROUP  BY c.name\nORDER  BY c.name;"
      } }
  ],
  manual:[
    '기관명: 발주 기관명',
    '영문명(풀네임)·표준도메인명 확정·제정일자 수기 — 제정일자는 시스템 구축일(02번 최초등록일 최솟값)로 통일 가능',
    '같은 코멘트에 컬럼명 여럿 = 표준화 안 된 흔적 → 대표 정하고 특이사항 기록',
    '"코멘트종류수" 2 이상 = 같은 컬럼명인데 테이블마다 다른 한글명 → 표준 용어 하나로 확정 필요 (검증용 열, 제출 시 삭제)',

{
  key:'d06', no:'05', label:'DB 표준단어',
  sub:'용어를 구성하는 최소 단위. 컬럼명을 _ 로 분해.',
  formCols:'순번 | 기관명 | DB명 | 표준단어명 | 단어영문명 | 단어영문약어명 | 단어설명 | 형식단어여부 | 도메인분류명 | 이음동의어목록 | 금칙어목록 | 관리부서명 | 제정일자 | 특이사항',
  sql:[
    { title:'단어 분해 (유니크 단어 + 사용횟수)',
      q:{
        tibero:"SELECT 단어 AS 단어영문약어명, COUNT(*) AS 사용횟수\nFROM (\n    SELECT REGEXP_SUBSTR(C.COLUMN_NAME, '[^_]+', 1, L.LV) AS 단어\n    FROM   (SELECT DISTINCT COLUMN_NAME FROM ALL_TAB_COLUMNS\n            WHERE  OWNER IN __SCHEMAS__) C,\n           (SELECT LEVEL LV FROM DUAL CONNECT BY LEVEL <= 10) L\n    WHERE  REGEXP_SUBSTR(C.COLUMN_NAME, '[^_]+', 1, L.LV) IS NOT NULL\n)\nGROUP  BY 단어\nORDER  BY 사용횟수 DESC;",
        mysql:"-- MySQL 8.0 / MariaDB 10.2+ (재귀 CTE)\nWITH RECURSIVE cols AS (\n    SELECT DISTINCT COLUMN_NAME\n    FROM   information_schema.COLUMNS\n    WHERE  TABLE_SCHEMA IN __SCHEMAS__\n), n AS (\n    SELECT 1 AS i UNION ALL SELECT i + 1 FROM n WHERE i < 10\n)\nSELECT SUBSTRING_INDEX(SUBSTRING_INDEX(COLUMN_NAME, '_', i), '_', -1) AS 단어,\n       COUNT(*) AS 사용횟수\nFROM   cols JOIN n\n       ON i <= 1 + LENGTH(COLUMN_NAME) - LENGTH(REPLACE(COLUMN_NAME, '_', ''))\nGROUP  BY 단어\nORDER  BY 사용횟수 DESC;",
        pg:"SELECT word AS 단어, COUNT(*) AS 사용횟수\nFROM   (SELECT DISTINCT column_name FROM information_schema.columns\n        WHERE  table_schema IN __SCHEMAS__) c,\n       LATERAL regexp_split_to_table(c.column_name, '_') AS word\nGROUP  BY word\nORDER  BY 2 DESC;",
        mssql:"-- SQL Server 2016+ (STRING_SPLIT)\nSELECT value AS 단어, COUNT(*) AS 사용횟수\nFROM   (SELECT DISTINCT c.name\n        FROM   sys.columns c\n               JOIN sys.tables t  ON c.object_id = t.object_id\n               JOIN sys.schemas s ON t.schema_id = s.schema_id\n        WHERE  s.name IN __SCHEMAS__) x\n       CROSS APPLY STRING_SPLIT(x.name, '_')\nGROUP  BY value\nORDER  BY 2 DESC;",
        sybase:"-- ASE는 문자열 분해 함수 부재 — 컬럼명 목록만 뽑아 엑셀 '텍스트 나누기'로 분해\nSELECT DISTINCT c.name AS 컬럼명\nFROM   sysobjects o JOIN syscolumns c ON o.id = c.id\nWHERE  o.type = 'U'\nORDER  BY c.name;"
      } }
  ],
  manual:[
    '단어별 한글명(표준단어명)·설명 매칭 수기 — 사용횟수 상위부터 채우면 효율적',
    '형식단어여부 기본 N (여부/코드/일자 같은 분류성 단어만 Y 검토)'
  ]
},
{
  key:'d07', no:'06', label:'DB 표준도메인',
  sub:'타입+길이 조합의 표준. 컬럼 접미사(_YN, _CD, _DT…)가 분류 힌트.',
  formCols:'순번 | 기관명 | DB명 | 표준도메인그룹명 | 도메인분류명 | 도메인명 | 도메인설명 | 데이터타입 | 데이터길이 | 소수점길이 | 저장형식 | 표현형식 | 단위 | 허용값 | 관리부서명 | 제정일자 | 특이사항',
  sql:[
    { title:'도메인 후보 (접미사=분류, 타입+길이 집계)',
      q:{
        tibero:"SELECT MIN(OWNER)                                                AS DB명,\n       SUBSTR(COLUMN_NAME, INSTR(COLUMN_NAME, '_', -1) + 1)      AS 도메인분류후보,\n       DATA_TYPE                                                 AS 데이터타입,\n       CASE WHEN DATA_TYPE LIKE '%CHAR%'        THEN CHAR_LENGTH\n            WHEN DATA_TYPE IN ('NUMBER','FLOAT') THEN DATA_PRECISION\n            WHEN DATA_TYPE LIKE 'DATE%' OR DATA_TYPE LIKE 'TIMESTAMP%' OR DATA_TYPE LIKE 'INTERVAL%' THEN NULL\n            ELSE DATA_LENGTH END                                 AS 데이터길이,\n       DATA_SCALE                                                AS 소수점길이,\n       COUNT(*)                                                  AS 사용횟수\nFROM   ALL_TAB_COLUMNS\nWHERE  OWNER IN __SCHEMAS__\nGROUP  BY SUBSTR(COLUMN_NAME, INSTR(COLUMN_NAME, '_', -1) + 1),\n       DATA_TYPE, CHAR_LENGTH, DATA_PRECISION, DATA_LENGTH, DATA_SCALE\nORDER  BY 2, 6 DESC;",
        mysql:"SELECT MIN(TABLE_SCHEMA)                            AS DB명,\n       SUBSTRING_INDEX(COLUMN_NAME, '_', -1)        AS 도메인분류후보,\n       DATA_TYPE                                    AS 데이터타입,\n       COALESCE(CHARACTER_MAXIMUM_LENGTH, NUMERIC_PRECISION) AS 데이터길이,\n       NUMERIC_SCALE                                AS 소수점길이,\n       COUNT(*)                                     AS 사용횟수\nFROM   information_schema.COLUMNS\nWHERE  TABLE_SCHEMA IN __SCHEMAS__\nGROUP  BY SUBSTRING_INDEX(COLUMN_NAME, '_', -1), DATA_TYPE,\n       COALESCE(CHARACTER_MAXIMUM_LENGTH, NUMERIC_PRECISION), NUMERIC_SCALE\nORDER  BY 2, 6 DESC;",
        pg:"SELECT MIN(table_schema)                              AS DB명,\n       substring(column_name FROM '[^_]+$')           AS 도메인분류후보,\n       data_type                                      AS 데이터타입,\n       COALESCE(character_maximum_length, numeric_precision) AS 데이터길이,\n       numeric_scale                                  AS 소수점길이,\n       COUNT(*)                                       AS 사용횟수\nFROM   information_schema.columns\nWHERE  table_schema IN __SCHEMAS__\nGROUP  BY substring(column_name FROM '[^_]+$'), data_type,\n       COALESCE(character_maximum_length, numeric_precision), numeric_scale\nORDER  BY 2, 6 DESC;",
        mssql:"SELECT s.name                                                       AS DB명,\n       RIGHT(c.name, CHARINDEX('_', REVERSE(c.name) + '_') - 1)     AS 도메인분류후보,\n       ty.name                                                      AS 데이터타입,\n       CASE WHEN c.max_length = -1 THEN NULL\n            WHEN ty.name LIKE 'n%' AND (ty.name LIKE '%char%' OR ty.name LIKE '%text%') THEN c.max_length / 2\n            WHEN ty.name LIKE '%char%' OR ty.name LIKE '%binary%' THEN c.max_length\n            WHEN ty.name IN ('decimal','numeric') THEN c.precision\n            ELSE NULL END                                           AS 데이터길이,\n       CASE WHEN ty.name IN ('decimal','numeric') THEN c.scale ELSE NULL END AS 소수점길이,\n       COUNT(*)                                                     AS 사용횟수\nFROM   sys.columns c\n       JOIN sys.tables t  ON c.object_id = t.object_id\n       JOIN sys.schemas s ON t.schema_id = s.schema_id\n       JOIN sys.types ty  ON c.user_type_id = ty.user_type_id\nWHERE  s.name IN __SCHEMAS__\nGROUP  BY s.name, RIGHT(c.name, CHARINDEX('_', REVERSE(c.name) + '_') - 1),\n       ty.name, c.max_length, c.precision, c.scale\nORDER  BY 2, 6 DESC;",
        sybase:"SELECT t.name   AS 데이터타입,\n       c.length AS 데이터길이,\n       COUNT(*) AS 사용횟수\nFROM   sysobjects o\n       JOIN syscolumns c ON o.id = c.id\n       JOIN systypes  t ON c.usertype = t.usertype\nWHERE  o.type = 'U'\nGROUP  BY t.name, c.length\nORDER  BY 3 DESC;\n-- 접미사 분해는 엑셀에서 (문자열 함수 제약)"
      } }
  ],
  manual:[
    '도메인명 명명 수기 (예: _YN+CHAR(1) → "여부C1", _DT+VARCHAR(14) → "일시C14")',
    '같은 접미사에 타입 여럿 = 도메인 불일치 → 대표 정하고 특이사항 기록'
  ]
},

        mssql:"SELECT s.name, t.name, CAST(ep.value AS NVARCHAR(200)) AS comments\nFROM   sys.tables t\n       JOIN sys.schemas s ON t.schema_id = s.schema_id\n       LEFT JOIN sys.extended_properties ep ON ep.major_id = t.object_id\n            AND ep.minor_id = 0 AND ep.name = 'MS_Description'\nWHERE  s.name IN __SCHEMAS__\n       AND (t.name LIKE '%CD%' OR t.name LIKE '%CODE%' OR t.name LIKE '%COMM%'\n            OR CAST(ep.value AS NVARCHAR(200)) LIKE '%코드%');",

    { title:'2단계: 확정 후 (테이블·컬럼명 실물로 치환 — 전 방언 공통 틀)',

{
  key:'d10', no:'10', label:'인덱스 정의서',
  sub:'인덱스 1컬럼 = 1행. 복합인덱스는 컬럼순서대로. 성능·마이그레이션 기준선. (시스템 필요분)',

  sql:[
    { title:'인덱스 + 컬럼 (컬럼순서대로)',
      q:{
        tibero:"SELECT I.TABLE_OWNER      AS DB명,\n       I.TABLE_NAME       AS 테이블명,\n       I.INDEX_NAME       AS 인덱스명,\n       CASE WHEN C.CONSTRAINT_TYPE = 'P' THEN 'PK'\n            WHEN C.CONSTRAINT_TYPE = 'U' THEN 'UNIQUE'\n            WHEN I.UNIQUENESS = 'UNIQUE' THEN 'UNIQUE' ELSE '일반' END AS 인덱스구분,\n       IC.COLUMN_POSITION AS 컬럼순서,\n       IC.COLUMN_NAME     AS 컬럼명,\n       IC.DESCEND         AS 정렬,\n       DECODE(I.UNIQUENESS, 'UNIQUE', 'Y', 'N') AS 유니크여부\nFROM   ALL_INDEXES I\n       JOIN ALL_IND_COLUMNS IC ON IC.INDEX_OWNER = I.OWNER AND IC.INDEX_NAME = I.INDEX_NAME\n       LEFT JOIN ALL_CONSTRAINTS C ON C.OWNER = I.TABLE_OWNER AND C.INDEX_NAME = I.INDEX_NAME\n            AND C.CONSTRAINT_TYPE IN ('P','U')\nWHERE  I.TABLE_OWNER IN __SCHEMAS__\nORDER  BY I.TABLE_NAME, I.INDEX_NAME, IC.COLUMN_POSITION;\n-- 함수기반 인덱스는 IC.COLUMN_NAME이 SYS_NC$ 형태(숨김) — 식 원문은 ALL_IND_EXPRESSIONS 참고",
        mysql:"SELECT TABLE_SCHEMA AS DB명, TABLE_NAME AS 테이블명, INDEX_NAME AS 인덱스명,\n       CASE WHEN INDEX_NAME = 'PRIMARY' THEN 'PK' WHEN NON_UNIQUE = 0 THEN 'UNIQUE' ELSE '일반' END AS 인덱스구분,\n       SEQ_IN_INDEX AS 컬럼순서, COLUMN_NAME AS 컬럼명,\n       CASE WHEN COLLATION = 'D' THEN 'DESC' ELSE 'ASC' END AS 정렬,\n       IF(NON_UNIQUE = 0, 'Y', 'N') AS 유니크여부\nFROM   information_schema.STATISTICS\nWHERE  TABLE_SCHEMA IN __SCHEMAS__\nORDER  BY TABLE_NAME, INDEX_NAME, SEQ_IN_INDEX;",
        pg:"SELECT n.nspname AS DB명, t.relname AS 테이블명, i.relname AS 인덱스명,\n       CASE WHEN ix.indisprimary THEN 'PK' WHEN ix.indisunique THEN 'UNIQUE' ELSE '일반' END AS 인덱스구분,\n       k.ord AS 컬럼순서, a.attname AS 컬럼명,\n       CASE WHEN ix.indisunique THEN 'Y' ELSE 'N' END AS 유니크여부\nFROM   pg_index ix\n       JOIN pg_class i     ON i.oid = ix.indexrelid\n       JOIN pg_class t     ON t.oid = ix.indrelid\n       JOIN pg_namespace n ON n.oid = t.relnamespace\n       CROSS JOIN LATERAL unnest(ix.indkey) WITH ORDINALITY AS k(attnum, ord)\n       LEFT JOIN pg_attribute a ON a.attrelid = t.oid AND a.attnum = k.attnum\nWHERE  n.nspname IN __SCHEMAS__ AND k.ord <= ix.indnkeyatts   -- INCLUDE(covering) 컬럼 제외; indnkeyatts는 PG11+ (10↓은 이 조건 삭제)\nORDER  BY t.relname, i.relname, k.ord;\n-- 정렬(ASC/DESC)·표현식 인덱스 원문: SELECT pg_get_indexdef(ix.indexrelid) — attname NULL은 표현식 인덱스",
        mssql:"SELECT s.name AS DB명, t.name AS 테이블명, i.name AS 인덱스명,\n       CASE WHEN i.is_primary_key = 1 THEN 'PK' WHEN i.is_unique = 1 THEN 'UNIQUE' ELSE '일반' END AS 인덱스구분,\n       ic.key_ordinal AS 컬럼순서, c.name AS 컬럼명,\n       CASE WHEN ic.is_descending_key = 1 THEN 'DESC' ELSE 'ASC' END AS 정렬,\n       CASE WHEN i.is_unique = 1 THEN 'Y' ELSE 'N' END AS 유니크여부\nFROM   sys.indexes i\n       JOIN sys.tables t  ON i.object_id = t.object_id\n       JOIN sys.schemas s ON t.schema_id = s.schema_id\n       JOIN sys.index_columns ic ON ic.object_id = i.object_id AND ic.index_id = i.index_id\n       JOIN sys.columns c ON c.object_id = ic.object_id AND c.column_id = ic.column_id\nWHERE  s.name IN __SCHEMAS__ AND i.type > 0 AND ic.is_included_column = 0\nORDER  BY t.name, i.name, ic.key_ordinal;",
        sybase:"-- ASE: sysindexes.indid 1~254 = 인덱스. 컬럼은 index_col()로 1번부터\nSELECT o.name AS 테이블명, i.name AS 인덱스명,\n       index_col(o.name, i.indid, 1) AS 컬럼1,\n       index_col(o.name, i.indid, 2) AS 컬럼2,\n       index_col(o.name, i.indid, 3) AS 컬럼3\nFROM   sysobjects o JOIN sysindexes i ON o.id = i.id\nWHERE  o.type = 'U' AND i.indid BETWEEN 1 AND 254\nORDER  BY o.name, i.indid;\n-- 컬럼 4개↑면 index_col 인자 추가. 상세: sp_helpindex 테이블명. DB별 USE 데이터베이스명"
      } }
  ],
  manual:[
    '인덱스구분: PK/UNIQUE 제약 백킹인덱스는 그걸로, 나머지는 UNIQUE 속성이면 UNIQUE 아니면 일반',
    'PG는 정렬(ASC/DESC)·표현식 인덱스 판별이 딕셔너리에서 복잡 — 필요시 pg_get_indexdef로 원문 확인',
    '인덱스 통계 신선도(Oracle LAST_ANALYZED 등) 오래되면 옵티마이저 오판 — 02 볼륨 통계경고와 같은 기준으로 확인'
  ]
},
{
  key:'d11', no:'11', label:'제약조건 정의서',
  sub:'PK/UNIQUE/CHECK 제약. CHECK식은 06/07 허용값 근거. DEFAULT는 03 기본값 열 참조. (시스템 필요분)',
  formCols:'순번 | DB명 | 테이블명 | 제약조건명 | 제약유형(PK/UNIQUE/CHECK) | 제약내용(CHECK식·컬럼구성은 10 인덱스정의서 참고)',
  sql:[
    { title:'제약조건 (P/U/C)',
      q:{
        tibero:"SELECT C.OWNER AS DB명, C.TABLE_NAME AS 테이블명, C.CONSTRAINT_NAME AS 제약조건명,\n       DECODE(C.CONSTRAINT_TYPE, 'P','PK', 'U','UNIQUE', 'C','CHECK') AS 제약유형,\n       C.SEARCH_CONDITION AS 제약내용   -- CHECK식\nFROM   ALL_CONSTRAINTS C\nWHERE  C.OWNER IN __SCHEMAS__ AND C.CONSTRAINT_TYPE IN ('P','U','C')\nORDER  BY C.TABLE_NAME, C.CONSTRAINT_TYPE, C.CONSTRAINT_NAME;\n-- 제약별 1행(방언 정합). PK/UNIQUE 컬럼 구성은 10 인덱스정의서 참고\n-- NOT NULL도 CHECK(SYS_C...)로 잡힘 — 순수 CHECK만: AND CONSTRAINT_NAME NOT LIKE 'SYS[_]%' 추가\n-- DEFAULT값은 03 컬럼정의서 기본값 열(DATA_DEFAULT) 참고\n-- ※ SEARCH_CONDITION 은 Tibero에서 VARCHAR(65532) — LONG 아니므로 인라인뷰/GROUP BY 제약 없음.\n--   (Oracle은 LONG이라 ROWNUM 인라인뷰에 넣으면 ORA-00997. 03번 DATA_DEFAULT 와 다른 점)",
        mysql:"-- CHECK는 MySQL 8.0.16+ / MariaDB 10.2+\nSELECT tc.TABLE_SCHEMA AS DB명, tc.TABLE_NAME AS 테이블명, tc.CONSTRAINT_NAME AS 제약조건명,\n       tc.CONSTRAINT_TYPE AS 제약유형, cc.CHECK_CLAUSE AS 제약내용\nFROM   information_schema.TABLE_CONSTRAINTS tc\n       LEFT JOIN information_schema.CHECK_CONSTRAINTS cc\n            ON cc.CONSTRAINT_SCHEMA = tc.TABLE_SCHEMA AND cc.CONSTRAINT_NAME = tc.CONSTRAINT_NAME\nWHERE  tc.TABLE_SCHEMA IN __SCHEMAS__ AND tc.CONSTRAINT_TYPE IN ('PRIMARY KEY','UNIQUE','CHECK')\nORDER  BY tc.TABLE_NAME, tc.CONSTRAINT_TYPE;\n-- DEFAULT는 03 기본값 열(COLUMN_DEFAULT) 참고",
        pg:"SELECT n.nspname AS DB명, t.relname AS 테이블명, con.conname AS 제약조건명,\n       CASE con.contype WHEN 'p' THEN 'PK' WHEN 'u' THEN 'UNIQUE' WHEN 'c' THEN 'CHECK' END AS 제약유형,\n       pg_get_constraintdef(con.oid) AS 제약내용\nFROM   pg_constraint con\n       JOIN pg_class t     ON t.oid = con.conrelid\n       JOIN pg_namespace n ON n.oid = t.relnamespace\nWHERE  n.nspname IN __SCHEMAS__ AND con.contype IN ('p','u','c')\nORDER  BY t.relname, con.contype, con.conname;\n-- DEFAULT는 03 기본값 열(pg_attrdef) 참고",
        mssql:"-- CHECK\nSELECT s.name AS DB명, t.name AS 테이블명, cc.name AS 제약조건명, 'CHECK' AS 제약유형, cc.definition AS 제약내용\nFROM   sys.check_constraints cc JOIN sys.tables t ON cc.parent_object_id = t.object_id\n       JOIN sys.schemas s ON t.schema_id = s.schema_id\nWHERE  s.name IN __SCHEMAS__\nUNION ALL\n-- DEFAULT\nSELECT s.name, t.name, dc.name, 'DEFAULT', dc.definition\nFROM   sys.default_constraints dc JOIN sys.tables t ON dc.parent_object_id = t.object_id\n       JOIN sys.schemas s ON t.schema_id = s.schema_id\nWHERE  s.name IN __SCHEMAS__\nUNION ALL\n-- UNIQUE\nSELECT s.name, t.name, i.name, 'UNIQUE', NULL\nFROM   sys.indexes i JOIN sys.tables t ON i.object_id = t.object_id\n       JOIN sys.schemas s ON t.schema_id = s.schema_id\nWHERE  s.name IN __SCHEMAS__ AND i.is_unique_constraint = 1\nORDER  BY 2, 4;",
        sybase:"-- ASE: CHECK/DEFAULT 텍스트는 syscomments(sysconstraints 연결) — 버전차 큼. 정확은 sp_helpconstraint\nSELECT o.name AS 테이블명, obj.name AS 제약조건명, com.text AS 제약내용\nFROM   sysconstraints con\n       JOIN sysobjects o   ON con.tableid = o.id\n       JOIN sysobjects obj ON con.constrid = obj.id\n       LEFT JOIN syscomments com ON com.id = con.constrid\nWHERE  o.type = 'U'\nORDER  BY o.name;"
      } }
  ],
  manual:[
    'CHECK식 = 06/07 도메인 허용값(_YN → Y/N 등) 자동 초안 근거 — 엑셀서 허용값만 추출',
    'Oracle SEARCH_CONDITION·PG constraintdef·MSSQL definition은 정의 원문 그대로',
    'DEFAULT값은 03 컬럼정의서 기본값 열과 중복 — 이 문서는 CHECK/UNIQUE 위주, DEFAULT는 참조만'
  ]
},
{
  key:'d12', no:'12', label:'뷰 정의서',
  sub:'뷰 1개 = 1행(정의문 포함). 09 연계용 뷰목록과 달리 전체 뷰+정의+의존. (시스템 필요분)',
  formCols:'순번 | DB명 | 뷰명 | 뷰정의(SQL) | 비고(의존 기저테이블)',
  sql:[
    { title:'뷰 목록 + 정의문',
      q:{
        tibero:"SELECT V.OWNER AS DB명, V.VIEW_NAME AS 뷰명, V.TEXT AS 뷰정의   -- TEXT는 LONG형\nFROM   ALL_VIEWS V\nWHERE  V.OWNER IN __SCHEMAS__\nORDER  BY V.VIEW_NAME;\n-- 의존 기저테이블: SELECT OWNER, NAME, REFERENCED_OWNER, REFERENCED_NAME FROM ALL_DEPENDENCIES\n--   WHERE OWNER IN __SCHEMAS__ AND TYPE = 'VIEW' AND REFERENCED_TYPE = 'TABLE';",
        mysql:"SELECT TABLE_SCHEMA AS DB명, TABLE_NAME AS 뷰명, VIEW_DEFINITION AS 뷰정의\nFROM   information_schema.VIEWS\nWHERE  TABLE_SCHEMA IN __SCHEMAS__\nORDER  BY TABLE_NAME;",
        pg:"SELECT schemaname AS DB명, viewname AS 뷰명,\n       pg_get_viewdef((quote_ident(schemaname) || '.' || quote_ident(viewname))::regclass, true) AS 뷰정의\nFROM   pg_views\nWHERE  schemaname IN __SCHEMAS__\nORDER  BY viewname;",
        mssql:"SELECT s.name AS DB명, v.name AS 뷰명, m.definition AS 뷰정의\nFROM   sys.views v\n       JOIN sys.schemas s ON v.schema_id = s.schema_id\n       LEFT JOIN sys.sql_modules m ON m.object_id = v.object_id\nWHERE  s.name IN __SCHEMAS__\nORDER  BY v.name;\n-- 의존: SELECT referenced_entity_name FROM sys.sql_expression_dependencies WHERE referencing_id = OBJECT_ID('스키마.뷰명');",
        sybase:"-- text가 여러 조각 — colid2 순으로 이어붙여야 완전한 정의. 전문 한 번에: sp_helptext 뷰명\nSELECT o.name AS 뷰명, c.text AS 뷰정의조각\nFROM   sysobjects o JOIN syscomments c ON o.id = c.id\nWHERE  o.type = 'V'\nORDER  BY o.name, c.colid2;"
      } }
  ],
  manual:[
    '뷰정의(TEXT/definition)는 CREATE VIEW 원문 — 업무로직 담긴 뷰는 용도 수기 보강',
    '의존 기저테이블은 딕셔너리에서 매핑 가능(주석 쿼리) — 연계용 뷰는 09와 교차확인'
  ]
},
{
  key:'d13', no:'13', label:'프로시저·함수·트리거 정의서',
  sub:'DB에 든 업무로직. 소스가 행 단위로 쪼개짐 → 객체별 이어붙이기. (시스템 필요분)',
  formCols:'순번 | DB명 | 객체명 | 객체유형(PROC/FUNC/TRIGGER) | 정의(소스)',
  sql:[
    { title:'프로시저/함수/트리거 소스',
      q:{
        tibero:"-- 소스 전문(행 단위). 목록만이면 하단 주석 쿼리\nSELECT OWNER AS DB명, NAME AS 객체명, TYPE AS 객체유형, LINE AS 행, TEXT AS 소스\nFROM   ALL_SOURCE\nWHERE  OWNER IN __SCHEMAS__ AND TYPE IN ('PROCEDURE','FUNCTION','PACKAGE','PACKAGE BODY','TRIGGER')\nORDER  BY NAME, LINE;\n-- 목록: SELECT OWNER, OBJECT_NAME, OBJECT_TYPE FROM ALL_OBJECTS WHERE OWNER IN __SCHEMAS__\n--   AND OBJECT_TYPE IN ('PROCEDURE','FUNCTION','TRIGGER','PACKAGE');\n-- 트리거 상세: SELECT TABLE_NAME, TRIGGERING_EVENT, TRIGGER_BODY FROM ALL_TRIGGERS WHERE OWNER IN __SCHEMAS__;",
        mysql:"-- 프로시저/함수\nSELECT ROUTINE_SCHEMA AS DB명, ROUTINE_NAME AS 객체명, ROUTINE_TYPE AS 객체유형, ROUTINE_DEFINITION AS 정의\nFROM   information_schema.ROUTINES\nWHERE  ROUTINE_SCHEMA IN __SCHEMAS__;\n-- 트리거\nSELECT TRIGGER_SCHEMA AS DB명, TRIGGER_NAME AS 객체명, 'TRIGGER' AS 객체유형,\n       CONCAT(ACTION_TIMING, ' ', EVENT_MANIPULATION, ' ON ', EVENT_OBJECT_TABLE) AS 정의\nFROM   information_schema.TRIGGERS\nWHERE  TRIGGER_SCHEMA IN __SCHEMAS__;",
        pg:"SELECT n.nspname AS DB명, p.proname AS 객체명,\n       CASE p.prokind WHEN 'f' THEN 'FUNCTION' WHEN 'p' THEN 'PROCEDURE' WHEN 'a' THEN 'AGGREGATE' WHEN 'w' THEN 'WINDOW' END AS 객체유형,\n       pg_get_functiondef(p.oid) AS 정의\nFROM   pg_proc p JOIN pg_namespace n ON n.oid = p.pronamespace\nWHERE  n.nspname IN __SCHEMAS__\nORDER  BY p.proname;\n-- prokind는 PG11+ (10↓은 proisagg/proiswindow)\n-- 트리거: SELECT event_object_table, trigger_name, action_timing, event_manipulation, action_statement\n--   FROM information_schema.triggers WHERE trigger_schema IN __SCHEMAS__;",
        mssql:"SELECT s.name AS DB명, o.name AS 객체명, o.type_desc AS 객체유형, m.definition AS 정의\nFROM   sys.sql_modules m\n       JOIN sys.objects o ON m.object_id = o.object_id\n       JOIN sys.schemas s ON o.schema_id = s.schema_id\nWHERE  s.name IN __SCHEMAS__ AND o.type IN ('P','FN','IF','TF','TR')\nORDER  BY o.type, o.name;\n-- P=프로시저 FN/IF/TF=함수 TR=트리거. definition NULL이면 암호화(WITH ENCRYPTION)",
        sybase:"SELECT o.name AS 객체명,\n       CASE o.type WHEN 'P' THEN 'PROCEDURE' WHEN 'TR' THEN 'TRIGGER' END AS 객체유형,\n       c.text AS 정의조각\nFROM   sysobjects o JOIN syscomments c ON o.id = c.id\nWHERE  o.type IN ('P','TR')\nORDER  BY o.name, c.colid2;\n-- 전문: sp_helptext 객체명. 암호화면 text 없음"
      } }
  ],
  manual:[
    '소스가 행 단위로 쪼개짐(Oracle ALL_SOURCE·Sybase syscomments) — 객체별 이어붙이거나 sp_helptext/원문',
    'DB에 업무로직 있으면 필수. 트리거는 대상테이블·이벤트 함께 기재',
    '암호화 객체는 정의 NULL — 소스 형상관리(SVN 등)에서 별도 확보'
  ]
},
{
  key:'d14', no:'14', label:'시퀀스 목록',
  sub:'채번 객체. MySQL/Sybase는 시퀀스 없어 AUTO_INCREMENT/IDENTITY로 대체. (시스템 필요분 · 소품)',
  formCols:'순번 | DB명 | 시퀀스명 | 현재값 | 증가값 | 최소값 | 최대값 | 순환여부',
  sql:[
    { title:'시퀀스 속성',
      q:{
        tibero:"SELECT SEQUENCE_OWNER AS DB명, SEQUENCE_NAME AS 시퀀스명, LAST_NUMBER AS 현재값,\n       INCREMENT_BY AS 증가값, MIN_VALUE AS 최소값, MAX_VALUE AS 최대값, CYCLE_FLAG AS 순환여부\nFROM   ALL_SEQUENCES\nWHERE  SEQUENCE_OWNER IN __SCHEMAS__\nORDER  BY SEQUENCE_NAME;",
        mysql:"-- MySQL엔 시퀀스 객체 없음(AUTO_INCREMENT). MariaDB 10.3+만 시퀀스\nSELECT TABLE_SCHEMA AS DB명, TABLE_NAME AS 시퀀스명\nFROM   information_schema.TABLES\nWHERE  TABLE_SCHEMA IN __SCHEMAS__ AND TABLE_TYPE = 'SEQUENCE';\n-- AUTO_INCREMENT 현재값: SELECT TABLE_NAME, AUTO_INCREMENT FROM information_schema.TABLES\n--   WHERE TABLE_SCHEMA IN __SCHEMAS__ AND AUTO_INCREMENT IS NOT NULL;",
        pg:"SELECT schemaname AS DB명, sequencename AS 시퀀스명, last_value AS 현재값,\n       increment_by AS 증가값, min_value AS 최소값, max_value AS 최대값, cycle AS 순환여부\nFROM   pg_sequences\nWHERE  schemaname IN __SCHEMAS__\nORDER  BY sequencename;\n-- pg_sequences는 PG10+ (9.x는 각 시퀀스 SELECT * FROM 시퀀스명)",
        mssql:"-- 시퀀스는 SQL Server 2012+ (이전은 IDENTITY)\nSELECT s.name AS DB명, seq.name AS 시퀀스명, seq.current_value AS 현재값,\n       seq.increment AS 증가값, seq.minimum_value AS 최소값,\n       seq.maximum_value AS 최대값, seq.is_cycling AS 순환여부   -- sql_variant 원형(decimal 시퀀스도 안전)\nFROM   sys.sequences seq JOIN sys.schemas s ON seq.schema_id = s.schema_id\nWHERE  s.name IN __SCHEMAS__\nORDER  BY seq.name;",
        sybase:"-- ASE는 시퀀스 객체 없음 — IDENTITY 컬럼 사용. 해당 테이블·컬럼:\nSELECT o.name AS 테이블명, c.name AS IDENTITY컬럼\nFROM   sysobjects o JOIN syscolumns c ON o.id = c.id\nWHERE  o.type = 'U' AND (c.status & 128) = 128;"
      } }
  ],
  manual:[
    '시퀀스 개념 없는 DBMS(MySQL/Sybase)는 AUTO_INCREMENT/IDENTITY로 대체 — 채번 방식만 기재',
    '현재값(LAST_NUMBER/last_value)은 캐시 반영 근사 — 정확한 다음값은 운영 중 변동'
  ]
},
{
  key:'d15', no:'15', label:'권한·롤 명세 ⚠',
  sub:'⚠ 민감 산출물. 실계정 반드시 익명화, 결과 파일 저장 금지. 이관 후 접근제어 재설정 기준. (시스템 필요분)',
  formCols:'순번 | 계정(★익명화) | 롤 | 권한종류 | 대상객체',
  sql:[
    { title:'계정·롤·권한 (실계정 익명화 전제)',
      q:{
        tibero:"-- ⚠ 결과에 실계정명 포함. 산출물 붙이기 전 반드시 익명화(APP_USER 식). 이 HTML엔 결과 저장 금지(OneDrive 동기화)\n-- 계정 목록\nSELECT USERNAME, ACCOUNT_STATUS, DEFAULT_TABLESPACE FROM DBA_USERS ORDER BY USERNAME;\n-- 롤 부여\nSELECT GRANTEE, GRANTED_ROLE FROM DBA_ROLE_PRIVS ORDER BY GRANTEE;\n-- 시스템 권한\nSELECT GRANTEE, PRIVILEGE FROM DBA_SYS_PRIVS ORDER BY GRANTEE;\n-- 객체 권한(업무 스키마 객체)\nSELECT GRANTEE, PRIVILEGE, OWNER, TABLE_NAME FROM DBA_TAB_PRIVS WHERE OWNER IN __SCHEMAS__ ORDER BY GRANTEE;\n-- DBA_ 권한 없으면 USER_/ALL_ 대체 또는 DBA 요청",
        mysql:"-- ⚠ 실계정 포함 — 익명화 후 제출. 결과 파일 저장 금지\nSELECT User AS 계정, Host FROM mysql.user ORDER BY User;\nSELECT GRANTEE, PRIVILEGE_TYPE FROM information_schema.USER_PRIVILEGES ORDER BY GRANTEE;\nSELECT GRANTEE, TABLE_SCHEMA, PRIVILEGE_TYPE FROM information_schema.SCHEMA_PRIVILEGES WHERE TABLE_SCHEMA IN __SCHEMAS__;\n-- 계정별 상세: SHOW GRANTS FOR 'user'@'host';",
        pg:"-- ⚠ 실계정(롤) 포함 — 익명화 후 제출. 결과 파일 저장 금지\nSELECT rolname AS 롤, rolsuper AS 슈퍼유저, rolcanlogin AS 로그인가능 FROM pg_roles ORDER BY rolname;\nSELECT grantee AS 계정, table_schema, table_name, privilege_type\nFROM   information_schema.role_table_grants\nWHERE  table_schema IN __SCHEMAS__\nORDER  BY grantee;",
        mssql:"-- ⚠ 실계정 포함 — 익명화 후 제출. 결과 파일 저장 금지\nSELECT name AS 계정, type_desc AS 유형 FROM sys.database_principals WHERE type IN ('S','U','G') ORDER BY name;\nSELECT dp.name AS 계정, o.name AS 대상객체, p.permission_name AS 권한, p.state_desc AS 상태\nFROM   sys.database_permissions p\n       JOIN sys.database_principals dp ON p.grantee_principal_id = dp.principal_id\n       LEFT JOIN sys.objects o ON p.major_id = o.object_id\nORDER  BY dp.name;",
        sybase:"-- ⚠ 실계정 포함 — 익명화 후 제출. 결과 파일 저장 금지\nSELECT name AS 계정 FROM master..syslogins ORDER BY name;\nSELECT u.name AS 사용자, o.name AS 대상객체, p.action AS 권한\nFROM   sysprotects p JOIN sysusers u ON p.uid = u.uid\n       JOIN sysobjects o ON p.id = o.id\nORDER  BY u.name;"
      } }
  ],
  manual:[
    '★ 보안: 결과에 실계정·권한구조 = 민감정보. 산출물엔 계정명 익명화(APP_USER/BATCH_USER 식) + 권한 구조만',
    '★ 이 HTML은 OneDrive 동기화 폴더 — 쿼리 결과(실계정)를 절대 파일에 저장·붙여넣기 금지 (실데이터 금지 규칙)',
    '용도: 시스템 이관 후 계정·접근제어 재설정 기준. 발주처 보안담당 승인 후 제출',
    'DBA_/master.. 권한 필요 — 없으면 DBA에 위임 추출 요청'

{
  key:'d90', no:'90', label:'부록: 데이터 품질 진단·정제',
  sub:'산출물 작성 중 만나는 오염 데이터 대응 쿼리 팩. 순서 고정: [진단] 분포 확인 → [정제] SELECT 변환 → [검증] 대사. 대상컬럼·테이블명은 자리표시자 — 치환 후 실행.',
  sql:[
    { title:'[진단] 문자 컬럼 포맷 분포 — 숫자→9, 영문→a/A로 접어 시그니처 집계',
      q:{
        tibero:"-- 어떤 포맷이 몇 건 섞였는지 전수 확인 — 정제 CASE는 이 결과를 보고 짠다 (짐작 금지)\nSELECT 포맷, COUNT(*) AS 건수, MIN(원값) AS 샘플1, MAX(원값) AS 샘플2\nFROM  (SELECT 대상컬럼 AS 원값,\n              TRANSLATE(대상컬럼,\n                '0123456789abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ',\n                '9999999999aaaaaaaaaaaaaaaaaaaaaaaaaaAAAAAAAAAAAAAAAAAAAAAAAAAA') AS 포맷\n       FROM   스키마명.테이블명) x\nGROUP  BY 포맷\nORDER  BY 건수 DESC;\n-- 결과 예: '9999-99-99 99:' 1200건 / 'Aaa 99 9999  9' 300건 / '99999999999999' 50000건",
        mysql:"-- MySQL 8.0+ (5.7 이하엔 REGEXP_REPLACE 없음 — REPLACE 10중첩으로 숫자만 접기)\n-- match_type 'c' 필수: 기본 collation(ci)에선 [a-z]가 대문자까지 잡는다\nSELECT 포맷, COUNT(*) AS 건수, MIN(원값) AS 샘플1, MAX(원값) AS 샘플2\nFROM  (SELECT 대상컬럼 AS 원값,\n              REGEXP_REPLACE(REGEXP_REPLACE(REGEXP_REPLACE(대상컬럼,\n                '[0-9]', '9', 1, 0, 'c'), '[a-z]', 'a', 1, 0, 'c'), '[A-Z]', 'A', 1, 0, 'c') AS 포맷\n       FROM   스키마명.테이블명) x\nGROUP  BY 포맷\nORDER  BY 건수 DESC;",
        pg:"SELECT 포맷, COUNT(*) AS 건수, MIN(원값) AS 샘플1, MAX(원값) AS 샘플2\nFROM  (SELECT 대상컬럼 AS 원값,\n              TRANSLATE(대상컬럼,\n                '0123456789abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ',\n                '9999999999aaaaaaaaaaaaaaaaaaaaaaaaaaAAAAAAAAAAAAAAAAAAAAAAAAAA') AS 포맷\n       FROM   스키마명.테이블명) x\nGROUP  BY 포맷\nORDER  BY 건수 DESC;",
        mssql:"-- SQL Server 2017+ (TRANSLATE). 2016 이하: REPLACE 10중첩으로 숫자만 접기\n-- COLLATE _BIN 필수: 기본 CI collation이면 대소문자 매핑이 섞인다\nSELECT 포맷, COUNT(*) AS 건수, MIN(원값) AS 샘플1, MAX(원값) AS 샘플2\nFROM  (SELECT 대상컬럼 AS 원값,\n              TRANSLATE(대상컬럼 COLLATE Latin1_General_BIN,\n                '0123456789abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ',\n                '9999999999aaaaaaaaaaaaaaaaaaaaaaaaaaAAAAAAAAAAAAAAAAAAAAAAAAAA') AS 포맷\n       FROM   스키마명.테이블명) x\nGROUP  BY 포맷\nORDER  BY 건수 DESC;",
        sybase:"-- TRANSLATE 없음 — 숫자만 9로 접는다. 영문 월('Mar' 등)은 그대로 남지만 그룹 수가 적어 충분\nSELECT 포맷, COUNT(*) AS 건수, MIN(원값) AS 샘플1\nFROM  (SELECT 대상컬럼 AS 원값,\n              str_replace(str_replace(str_replace(str_replace(str_replace(\n              str_replace(str_replace(str_replace(str_replace(대상컬럼,\n                '0','9'),'1','9'),'2','9'),'3','9'),'4','9'),'5','9'),'6','9'),'7','9'),'8','9') AS 포맷\n       FROM   테이블명) x\nGROUP  BY 포맷\nORDER  BY 건수 DESC;"
      } },
    { title:'[진단] PK 없는 테이블 목록 — 관계정의서·중복 위험 사전 확인',
      q:{
        tibero:"SELECT t.OWNER, t.TABLE_NAME\nFROM   ALL_TABLES t\nWHERE  t.OWNER IN __SCHEMAS__\n  AND  NOT EXISTS (SELECT 1 FROM ALL_CONSTRAINTS c\n                   WHERE  c.OWNER = t.OWNER AND c.TABLE_NAME = t.TABLE_NAME\n                     AND  c.CONSTRAINT_TYPE = 'P')\nORDER  BY t.OWNER, t.TABLE_NAME;",
        mysql:"SELECT t.TABLE_SCHEMA, t.TABLE_NAME\nFROM   information_schema.TABLES t\nWHERE  t.TABLE_SCHEMA IN __SCHEMAS__ AND t.TABLE_TYPE = 'BASE TABLE'\n  AND  NOT EXISTS (SELECT 1 FROM information_schema.TABLE_CONSTRAINTS c\n                   WHERE  c.TABLE_SCHEMA = t.TABLE_SCHEMA AND c.TABLE_NAME = t.TABLE_NAME\n                     AND  c.CONSTRAINT_TYPE = 'PRIMARY KEY')\nORDER  BY t.TABLE_SCHEMA, t.TABLE_NAME;",
        pg:"SELECT n.nspname AS 스키마, c.relname AS 테이블\nFROM   pg_class c JOIN pg_namespace n ON c.relnamespace = n.oid\nWHERE  c.relkind IN ('r','p') AND NOT c.relispartition\n  AND  n.nspname IN __SCHEMAS__\n  AND  NOT EXISTS (SELECT 1 FROM pg_constraint x WHERE x.conrelid = c.oid AND x.contype = 'p')\nORDER  BY 1, 2;\n-- PG 9.x: relispartition 없음 → 그 조건 삭제",
        mssql:"SELECT s.name AS 스키마, t.name AS 테이블\nFROM   sys.tables t JOIN sys.schemas s ON t.schema_id = s.schema_id\nWHERE  s.name IN __SCHEMAS__\n  AND  NOT EXISTS (SELECT 1 FROM sys.key_constraints kc\n                   WHERE  kc.parent_object_id = t.object_id AND kc.type = 'PK')\nORDER  BY 1, 2;",
        sybase:"-- sysindexes.status 비트 2048 = 선언적 PK 인덱스 (시스템테이블 레퍼런스 PDF sysindexes 장)\nSELECT o.name AS 테이블\nFROM   sysobjects o\nWHERE  o.type = 'U'\n  AND  NOT EXISTS (SELECT 1 FROM sysindexes i WHERE i.id = o.id AND i.status & 2048 = 2048)\nORDER  BY o.name;\n-- PK 선언 없이 유니크 인덱스로만 운영하는 테이블도 잡힘 — 실질 키는 sp_helpindex 테이블명 으로 확인"
      } },
    { title:'[진단] 후보키 중복·NULL 검사 — 0행이어야 PK 자격 (전 방언 공통)',
      q:{
        tibero:"-- PK 승격 후보 검증: 0행이어야 유일성 성립\nSELECT 후보키1, 후보키2, COUNT(*) AS 건수\nFROM   테이블명\nGROUP  BY 후보키1, 후보키2\nHAVING COUNT(*) > 1\nORDER  BY 건수 DESC;\n\n-- PK는 NULL 불가 — 중복과 별도로 확인\nSELECT COUNT(*) AS 키_NULL_건수\nFROM   테이블명\nWHERE  후보키1 IS NULL OR 후보키2 IS NULL;",
        mysql:"-- PK 승격 후보 검증: 0행이어야 유일성 성립\nSELECT 후보키1, 후보키2, COUNT(*) AS 건수\nFROM   테이블명\nGROUP  BY 후보키1, 후보키2\nHAVING COUNT(*) > 1\nORDER  BY 건수 DESC;\n\n-- PK는 NULL 불가 — 중복과 별도로 확인\nSELECT COUNT(*) AS 키_NULL_건수\nFROM   테이블명\nWHERE  후보키1 IS NULL OR 후보키2 IS NULL;",
        pg:"-- PK 승격 후보 검증: 0행이어야 유일성 성립\nSELECT 후보키1, 후보키2, COUNT(*) AS 건수\nFROM   테이블명\nGROUP  BY 후보키1, 후보키2\nHAVING COUNT(*) > 1\nORDER  BY 건수 DESC;\n\n-- PK는 NULL 불가 — 중복과 별도로 확인\nSELECT COUNT(*) AS 키_NULL_건수\nFROM   테이블명\nWHERE  후보키1 IS NULL OR 후보키2 IS NULL;",
        mssql:"-- PK 승격 후보 검증: 0행이어야 유일성 성립\nSELECT 후보키1, 후보키2, COUNT(*) AS 건수\nFROM   테이블명\nGROUP  BY 후보키1, 후보키2\nHAVING COUNT(*) > 1\nORDER  BY 건수 DESC;\n\n-- PK는 NULL 불가 — 중복과 별도로 확인\nSELECT COUNT(*) AS 키_NULL_건수\nFROM   테이블명\nWHERE  후보키1 IS NULL OR 후보키2 IS NULL;",
        sybase:"-- PK 승격 후보 검증: 0행이어야 유일성 성립\nSELECT 후보키1, 후보키2, COUNT(*) AS 건수\nFROM   테이블명\nGROUP  BY 후보키1, 후보키2\nHAVING COUNT(*) > 1\nORDER  BY 건수 DESC;\n\n-- PK는 NULL 불가 — 중복과 별도로 확인\nSELECT COUNT(*) AS 키_NULL_건수\nFROM   테이블명\nWHERE  후보키1 IS NULL OR 후보키2 IS NULL;"
      } },
    { title:'[진단] 값없음 표현 혼재 — NULL 대체값 분포 (\'\', \'-\', \'N/A\', 99991231 …)',
      q:{
        tibero:"-- Oracle/Tibero는 '' = NULL — TRIM 결과가 NULL이면 공백뿐인 값\nSELECT 대상컬럼 AS 값, COUNT(*) AS 건수\nFROM   스키마명.테이블명\nWHERE  대상컬럼 IS NULL\n   OR  TRIM(대상컬럼) IS NULL\n   OR  TRIM(대상컬럼) IN ('-', '.', '0', 'N/A', 'NA', 'NULL', '없음', '미상', '해당없음', '99999999', '99991231')\nGROUP  BY 대상컬럼\nORDER  BY 건수 DESC;\n-- 발견된 대체값은 산출물 기입 전 통일 (실제 NULL 처리 방침은 발주처 협의)",
        mysql:"SELECT 대상컬럼 AS 값, COUNT(*) AS 건수\nFROM   스키마명.테이블명\nWHERE  대상컬럼 IS NULL\n   OR  TRIM(대상컬럼) = ''\n   OR  TRIM(대상컬럼) IN ('-', '.', '0', 'N/A', 'NA', 'NULL', '없음', '미상', '해당없음', '99999999', '99991231')\nGROUP  BY 대상컬럼\nORDER  BY 건수 DESC;",
        pg:"SELECT 대상컬럼 AS 값, COUNT(*) AS 건수\nFROM   스키마명.테이블명\nWHERE  대상컬럼 IS NULL\n   OR  TRIM(대상컬럼) = ''\n   OR  TRIM(대상컬럼) IN ('-', '.', '0', 'N/A', 'NA', 'NULL', '없음', '미상', '해당없음', '99999999', '99991231')\nGROUP  BY 대상컬럼\nORDER  BY 건수 DESC;\n-- PG는 '' 와 NULL이 별개 — 둘 다 잡는다",
        mssql:"-- TRIM은 2017+ — 구버전 호환 위해 LTRIM(RTRIM()) 사용\nSELECT 대상컬럼 AS 값, COUNT(*) AS 건수\nFROM   스키마명.테이블명\nWHERE  대상컬럼 IS NULL\n   OR  LTRIM(RTRIM(대상컬럼)) = ''\n   OR  LTRIM(RTRIM(대상컬럼)) IN ('-', '.', '0', 'N/A', 'NA', 'NULL', '없음', '미상', '해당없음', '99999999', '99991231')\nGROUP  BY 대상컬럼\nORDER  BY 건수 DESC;",
        sybase:"SELECT 대상컬럼 AS 값, COUNT(*) AS 건수\nFROM   테이블명\nWHERE  대상컬럼 IS NULL\n   OR  ltrim(rtrim(대상컬럼)) = ''\n   OR  ltrim(rtrim(대상컬럼)) IN ('-', '.', '0', 'N/A', 'NA', 'NULL', '없음', '미상', '해당없음', '99999999', '99991231')\nGROUP  BY 대상컬럼\nORDER  BY 건수 DESC;"
      } },
    { title:'[진단] 공백·개행·비숫자·전각 혼입 탐지 (컬럼 성격별 지표 선택)',
      q:{
        tibero:"SELECT\n  COUNT(CASE WHEN 대상컬럼 <> TRIM(대상컬럼) THEN 1 END)  AS 앞뒤공백,\n  COUNT(CASE WHEN INSTR(대상컬럼, '　') > 0 THEN 1 END)   AS 전각공백,\n  COUNT(CASE WHEN INSTR(대상컬럼, CHR(10)) > 0 OR INSTR(대상컬럼, CHR(13)) > 0\n              OR INSTR(대상컬럼, CHR(9)) > 0 THEN 1 END)  AS 개행_탭,\n  COUNT(CASE WHEN TRANSLATE(대상컬럼, 'x0123456789', 'x') IS NOT NULL THEN 1 END) AS 비숫자_혼입,\n  COUNT(CASE WHEN LENGTHB(대상컬럼) <> LENGTH(대상컬럼) THEN 1 END) AS 한글_전각_포함\nFROM 스키마명.테이블명;\n-- 비숫자_혼입: 숫자만 들어야 하는 컬럼(금액·번호)에서만 의미\n-- 한글_전각_포함: 영숫자 컬럼(코드·ID)에서만 의미 — 한글 텍스트 컬럼이면 무시\n-- 개행_탭 있는 컬럼은 CSV 추출 시 행 깨짐 — 산출물 뽑기 전 REPLACE 필요",
        mysql:"SELECT\n  SUM(대상컬럼 <> TRIM(대상컬럼))                          AS 앞뒤공백,\n  SUM(INSTR(대상컬럼, '　') > 0)                           AS 전각공백,\n  SUM(INSTR(대상컬럼, CHAR(10)) > 0 OR INSTR(대상컬럼, CHAR(13)) > 0\n      OR INSTR(대상컬럼, CHAR(9)) > 0)                     AS 개행_탭,\n  SUM(대상컬럼 REGEXP '[^0-9]')                            AS 비숫자_혼입,\n  SUM(LENGTH(대상컬럼) <> CHAR_LENGTH(대상컬럼))            AS 한글_전각_포함\nFROM 스키마명.테이블명;\n-- LENGTH=바이트, CHAR_LENGTH=글자수 — 다르면 멀티바이트(한글·전각) 포함",
        pg:"SELECT\n  COUNT(*) FILTER (WHERE 대상컬럼 <> TRIM(대상컬럼))       AS 앞뒤공백,\n  COUNT(*) FILTER (WHERE POSITION('　' IN 대상컬럼) > 0)   AS 전각공백,\n  COUNT(*) FILTER (WHERE 대상컬럼 ~ '[\\n\\r\\t]')            AS 개행_탭,\n  COUNT(*) FILTER (WHERE 대상컬럼 ~ '[^0-9]')              AS 비숫자_혼입,\n  COUNT(*) FILTER (WHERE OCTET_LENGTH(대상컬럼) <> LENGTH(대상컬럼)) AS 한글_전각_포함\nFROM 스키마명.테이블명;",
